<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конвертер в Base64 + JSON</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      max-width: 700px;
      width: 100%;
      padding: 30px 25px;
    }
    h1 {
      font-size: 1.8rem;
      color: #1e2b3a;
      margin-bottom: 20px;
      text-align: center;
      border-bottom: 2px solid #e9edf4;
      padding-bottom: 12px;
    }
    .file-input-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
    }
    .file-input-area label {
      background: #2d7aff;
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      display: inline-block;
      box-shadow: 0 4px 8px rgba(45, 122, 255, 0.3);
    }
    .file-input-area label:hover {
      background: #1a5fd0;
      transform: scale(1.02);
    }
    .file-input-area input[type="file"] {
      display: none;
    }
    .file-info {
      background: #f8faff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid #dde3ed;
      font-size: 0.95rem;
      word-break: break-all;
    }
    .file-info p {
      margin: 6px 0;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .file-info .label {
      font-weight: 600;
      color: #2c3e50;
    }
    .conversion-section {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 18px 0 22px;
    }
    .conversion-section button {
      background: #eef2f7;
      border: none;
      padding: 8px 18px;
      border-radius: 30px;
      font-weight: 500;
      color: #1e2b3a;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid transparent;
    }
    .conversion-section button:hover {
      background: #d5dde9;
    }
    .conversion-section button.active {
      background: #2d7aff;
      color: white;
      border-color: #2d7aff;
    }
    .download-btn {
      background: #22a65e;
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 40px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      box-shadow: 0 4px 10px rgba(34, 166, 94, 0.35);
      margin-top: 10px;
    }
    .download-btn:hover {
      background: #1a8a4b;
      transform: scale(1.01);
    }
    .download-btn:disabled {
      background: #a0b3c9;
      cursor: not-allowed;
      box-shadow: none;
    }
    .preview {
      text-align: center;
      margin: 15px 0 5px;
    }
    .preview img, .preview audio {
      max-width: 100%;
      max-height: 250px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #f0f0f0;
    }
    .status {
      font-size: 0.9rem;
      color: #556b86;
      margin-top: 12px;
      text-align: center;
    }
    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #7a8b9f;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📁 Base64 + JSON конвертер</h1>

  <div class="file-input-area">
    <label for="fileInput">📤 Выберите файл (изображение или аудио)</label>
    <input type="file" id="fileInput" accept="image/*,audio/*">
  </div>

  <div id="fileInfo" class="file-info" style="display: none;">
    <p><span class="label">Имя:</span> <span id="fileName">—</span></p>
    <p><span class="label">Тип MIME:</span> <span id="fileMime">—</span></p>
    <p><span class="label">Размер:</span> <span id="fileSize">—</span></p>
    <p><span class="label">Base64 (первые 80 символов):</span> <span id="base64Preview">—</span></p>
    <div id="metadataArea"></div>
  </div>

  <div id="conversionButtons" class="conversion-section" style="display: none;">
    <button data-format="original" class="active">Оригинал</button>
    <button data-format="image/png">PNG</button>
    <button data-format="image/jpeg">JPEG</button>
    <button data-format="image/webp">WebP</button>
  </div>

  <div id="previewContainer" class="preview"></div>

  <button id="downloadBtn" class="download-btn" disabled>💾 Скачать JSON</button>
  <div class="status" id="statusMessage">Загрузите файл для начала</div>
  <div class="footer">Все данные обрабатываются локально в вашем браузере</div>
</div>

<script>
  (function() {
    // DOM elements
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileMime = document.getElementById('fileMime');
    const fileSize = document.getElementById('fileSize');
    const base64Preview = document.getElementById('base64Preview');
    const metadataArea = document.getElementById('metadataArea');
    const conversionButtons = document.getElementById('conversionButtons');
    const previewContainer = document.getElementById('previewContainer');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusMessage = document.getElementById('statusMessage');

    // State
    let currentFile = null;          // File object
    let currentBase64 = null;       // полный data URL (включая префикс)
    let currentMime = '';
    let currentMetadata = {};
    let convertedFormats = {};       // { mimeType: base64DataURL }
    let activeFormat = 'original';   // ключ для выбранного формата

    // Вспомогательные функции
    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(2) + ' MB';
    }

    function truncateBase64(str, max = 80) {
      if (!str) return '—';
      return str.length > max ? str.slice(0, max) + '…' : str;
    }

    // Извлечение метаданных для изображения
    function getImageMetadata(dataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          resolve({
            width: img.width,
            height: img.height,
            aspectRatio: (img.width / img.height).toFixed(3)
          });
        };
        img.onerror = reject;
        img.src = dataUrl;
      });
    }

    // Извлечение длительности для аудио
    function getAudioDuration(dataUrl) {
      return new Promise((resolve) => {
        const audio = new Audio(dataUrl);
        audio.onloadedmetadata = () => {
          const dur = audio.duration;
          resolve(isFinite(dur) ? dur : null);
        };
        audio.onerror = () => resolve(null);
        // Таймаут на случай, если не загрузится
        setTimeout(() => resolve(null), 5000);
      });
    }

    // Конвертация изображения в другой формат через canvas
    function convertImage(dataUrl, targetMime, quality = 0.92) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          canvas.toBlob((blob) => {
            if (!blob) return reject('Ошибка конвертации');
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
          }, targetMime, quality);
        };
        img.onerror = reject;
        img.src = dataUrl;
      });
    }

    // Основная функция обработки загруженного файла
    async function processFile(file) {
      if (!file) return;

      // Читаем как Data URL
      const reader = new FileReader();
      const dataUrl = await new Promise((resolve, reject) => {
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      currentFile = file;
      currentBase64 = dataUrl;
      currentMime = file.type || 'application/octet-stream';

      // Базовая информация
      fileName.textContent = file.name;
      fileMime.textContent = currentMime;
      fileSize.textContent = formatFileSize(file.size);
      base64Preview.textContent = truncateBase64(dataUrl, 80);

      // Сброс
      convertedFormats = {};
      activeFormat = 'original';
      currentMetadata = {};

      // Показываем блоки
      fileInfo.style.display = 'block';
      conversionButtons.style.display = 'none'; // покажем позже, если изображение
      previewContainer.innerHTML = '';
      downloadBtn.disabled = true;
      statusMessage.textContent = 'Обработка файла…';

      // Определяем тип
      const isImage = file.type.startsWith('image/');
      const isAudio = file.type.startsWith('audio/');

      // Метаданные
      let meta = {};

      if (isImage) {
        try {
          const imgMeta = await getImageMetadata(dataUrl);
          meta = { ...imgMeta, type: 'image' };
        } catch (e) {
          meta = { type: 'image', error: 'Не удалось получить размеры' };
        }

        // Отображаем кнопки конвертации
        conversionButtons.style.display = 'flex';
        // Убираем активный класс со всех, потом поставим на 'original'
        document.querySelectorAll('#conversionButtons button').forEach(btn => btn.classList.remove('active'));
        document.querySelector('#conversionButtons button[data-format="original"]')?.classList.add('active');

        // Добавляем оригинал в convertedFormats
        convertedFormats['original'] = dataUrl;

        // Предпросмотр изображения
        previewContainer.innerHTML = `<img src="${dataUrl}" alt="Предпросмотр">`;

        // Сохраняем конвертированные форматы позже, по запросу
        // При клике на кнопку будем конвертировать

        // Показываем метаданные
        let metaHtml = `<p><span class="label">Размеры:</span> ${meta.width || '?'} × ${meta.height || '?'} px</p>`;
        if (meta.aspectRatio) {
          metaHtml += `<p><span class="label">Соотношение:</span> ${meta.aspectRatio}</p>`;
        }
        metadataArea.innerHTML = metaHtml;

        // Включаем кнопку скачивания
        downloadBtn.disabled = false;
        statusMessage.textContent = 'Файл загружен. Выберите формат и скачайте JSON.';

      } else if (isAudio) {
        // Аудио
        const duration = await getAudioDuration(dataUrl);
        meta = { type: 'audio', duration: duration };
        if (duration !== null) {
          const minutes = Math.floor(duration / 60);
          const seconds = Math.floor(duration % 60);
          meta.durationFormatted = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // Показываем предпросмотр аудио
        previewContainer.innerHTML = `<audio controls src="${dataUrl}"></audio>`;

        // Скрываем кнопки конвертации (для аудио нет простой конвертации)
        conversionButtons.style.display = 'none';
        // Добавляем оригинал
        convertedFormats['original'] = dataUrl;
        activeFormat = 'original';

        // Метаданные
        let metaHtml = `<p><span class="label">Длительность:</span> ${meta.durationFormatted || '—'}</p>`;
        if (meta.duration !== null) {
          metaHtml += `<p><span class="label">Секунд:</span> ${meta.duration.toFixed(2)}</p>`;
        }
        metadataArea.innerHTML = metaHtml;

        downloadBtn.disabled = false;
        statusMessage.textContent = 'Аудиофайл загружен. Скачайте JSON с Base64.';

      } else {
        // Неизвестный тип – просто сохраняем как есть
        meta = { type: 'unknown' };
        conversionButtons.style.display = 'none';
        convertedFormats['original'] = dataUrl;
        activeFormat = 'original';
        metadataArea.innerHTML = `<p><span class="label">Тип:</span> Неизвестный (сохранён как есть)</p>`;
        downloadBtn.disabled = false;
        statusMessage.textContent = 'Файл загружен. Будет сохранён в Base64.';
      }

      currentMetadata = meta;

      // Обновляем кнопки выбора формата (уже есть)
      // Навешиваем обработчики на кнопки конвертации
      document.querySelectorAll('#conversionButtons button').forEach(btn => {
        btn.removeEventListener('click', onFormatClick);
        btn.addEventListener('click', onFormatClick);
      });

      // Также обновляем preview при клике на формат
    }

    // Обработчик клика по кнопке формата
    async function onFormatClick(e) {
      const btn = e.currentTarget;
      const format = btn.dataset.format;
      if (format === activeFormat) return;

      // Проверяем, есть ли уже сконвертированный
      if (convertedFormats[format]) {
        // Переключаемся
        activeFormat = format;
        updatePreviewForFormat(format);
        // Обновляем активную кнопку
        document.querySelectorAll('#conversionButtons button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        return;
      }

      // Если нет – конвертируем
      if (format === 'original') {
        // оригинал уже есть
        convertedFormats['original'] = currentBase64;
        activeFormat = 'original';
        updatePreviewForFormat('original');
        document.querySelectorAll('#conversionButtons button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        return;
      }

      // Конвертируем изображение
      statusMessage.textContent = `Конвертация в ${format}…`;
      try {
        const converted = await convertImage(currentBase64, format);
        convertedFormats[format] = converted;
        activeFormat = format;
        updatePreviewForFormat(format);
        document.querySelectorAll('#conversionButtons button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        statusMessage.textContent = `Конвертация в ${format} выполнена.`;
      } catch (err) {
        statusMessage.textContent = `Ошибка конвертации: ${err}`;
        console.error(err);
      }
    }

    // Обновить предпросмотр и базовую инфу для выбранного формата
    function updatePreviewForFormat(format) {
      const dataUrl = convertedFormats[format];
      if (!dataUrl) return;
      // Обновим preview
      const isImage = currentFile.type.startsWith('image/');
      if (isImage) {
        previewContainer.innerHTML = `<img src="${dataUrl}" alt="Предпросмотр (${format})">`;
      } else {
        // для аудио просто показываем аудио, но у нас только original
        previewContainer.innerHTML = `<audio controls src="${dataUrl}"></audio>`;
      }
      // Обновим base64 preview
      base64Preview.textContent = truncateBase64(dataUrl, 80);
      // Обновим MIME (для формата)
      let mimeDisplay = format;
      if (format === 'original') mimeDisplay = currentMime;
      else if (format.startsWith('image/')) mimeDisplay = format;
      fileMime.textContent = mimeDisplay;
    }

    // Скачивание JSON
    function downloadJSON() {
      if (!currentFile) return;

      // Собираем данные
      const data = {
        filename: currentFile.name,
        originalMime: currentMime,
        fileSize: currentFile.size,
        metadata: currentMetadata,
        base64: {
          original: currentBase64,   // всегда полный data URL
        }
      };

      // Добавляем все конвертированные форматы, если есть
      for (const [fmt, b64] of Object.entries(convertedFormats)) {
        if (fmt !== 'original') {
          data.base64[fmt] = b64;
        }
      }

      // Если выбран активный формат, добавим отдельно
      data.activeFormat = activeFormat;

      // Создаём JSON строку
      const jsonString = JSON.stringify(data, null, 2);

      // Скачиваем
      const blob = new Blob([jsonString], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const baseName = currentFile.name.replace(/\.[^.]+$/, '') || 'file';
      a.download = `${baseName}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      statusMessage.textContent = 'JSON файл скачан!';
    }

    // Обработчик выбора файла
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      // Сбрасываем input, чтобы можно было загрузить тот же файл повторно
      fileInput.value = '';
      try {
        await processFile(file);
      } catch (err) {
        statusMessage.textContent = 'Ошибка: ' + err.message;
        console.error(err);
      }
    });

    // Скачивание по клику
    downloadBtn.addEventListener('click', downloadJSON);

    // Инициализация сообщения
    statusMessage.textContent = 'Загрузите файл для начала';
  })();
</script>
</body>
</html>
