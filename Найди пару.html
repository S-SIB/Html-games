<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Color Match</title>
    <style>
        /* ── reset & base ── */
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #243b4a;
            --c1: #87bcde;
            --c2: #805e73;
            --c3: #6a8a9f;
            --c4: #a07d93;
            --font: 'Syne', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--c1);
            font-family: var(--font);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 0.8rem;
            /* mobile-first padding */
            touch-action: manipulation;
        }

        #game {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            width: 100%;
            max-width: 480px;
        }

        /* ── HUD ── */
        #hud {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .hstat {
            text-align: center;
            flex: 1 1 auto;
            min-width: 50px;
        }

        .hlbl {
            font-size: 0.55rem;
            letter-spacing: 0.13em;
            color: var(--c3);
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .hval {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--c1);
            line-height: 1.1;
        }

        #new-btn {
            font-family: var(--font);
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid var(--c2);
            color: var(--c2);
            padding: 0.4rem 0.9rem;
            border-radius: 0.1rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        #new-btn:hover {
            border-color: var(--c1);
            color: var(--c1);
        }
        #new-btn:active {
            opacity: 0.6;
        }

        /* ── combo bar ── */
        #combo-bar-wrap {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        #combo-lbl {
            font-size: 0.7rem;
            letter-spacing: 0.13em;
            color: var(--c3);
            text-transform: uppercase;
            white-space: nowrap;
        }

        #combo-track {
            flex: 1;
            height: 0.2rem;
            background: #1a2e3a;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        #combo-fill {
            height: 100%;
            background: var(--c1);
            border-radius: 0.5rem;
            transition: width 0.3s ease, background 0.3s;
            width: 0%;
        }

        #combo-mult {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--c1);
            min-width: 1.8rem;
            text-align: right;
        }

        /* ── grid ── */
        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            width: 100%;
        }

        .card {
            aspect-ratio: 1;
            cursor: pointer;
            perspective: 700px;
            border-radius: 0.1rem;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.36s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 0.1rem;
        }

        .card.flipped .card-inner,
        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-back,
        .card-front {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 0.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-back {
            background: #1a2e3a;
            border: 1px solid #354f5e;
        }

        .card-back-inner {
            width: 55%;
            height: 55%;
            border: 1.5px solid #354f5e;
            border-radius: 0.1rem;
        }

        .card-front {
            transform: rotateY(180deg);
            background: #1e3545;
            border: 1.5px solid rgba(135, 188, 222, 0.25);
            flex-direction: column;
            gap: 0.3rem;
            padding: 0.2rem;
        }

        .card.matched .card-front {
            border-color: rgba(135, 188, 222, 0.6);
        }

        .card.wrong .card-inner {
            animation: shake 0.38s ease;
        }

        @keyframes shake {
            0%,
            100% {
                transform: rotateY(180deg) translateX(0);
            }
            25% {
                transform: rotateY(180deg) translateX(-5px);
            }
            75% {
                transform: rotateY(180deg) translateX(5px);
            }
        }

        /* ── card contents ── */
        .swatch {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 90%;
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            flex-shrink: 0;
        }

        .card-label-swatch {
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 0.1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .card-label-hex {
            color: #87bcde;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            line-height: 1;
        }

        .card-label-name {
            color: #6a8a9f;
            font-size: 0.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            line-height: 1;
        }

        /* ── toast ── */
        #toast {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--c1);
            height: 1.2rem;
            text-align: center;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #toast.show {
            opacity: 1;
        }

        /* ── win overlay ── */
        #win {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            border: 1px solid var(--c1);
            border-radius: 0.1rem;
            background: #1a2e3a;
            padding: 0.7rem 1.2rem;
            width: 100%;
            text-align: center;
        }
        #win.show {
            display: flex;
        }

        #win-title {
            font-size: 1.2rem;
            font-weight: 650;
            color: var(--c1);
        }

        #win-sub {
            font-size: 0.8rem;
            color: var(--c3);
        }

        /* ── mobile adjustments ── */
        @media (max-width: 420px) {
            .hval {
                font-size: 1rem;
            }
            .hlbl {
                font-size: 0.5rem;
            }
            #new-btn {
                font-size: 0.5rem;
                padding: 0.3rem 0.7rem;
            }
            .swatch {
                width: 1.8rem;
                height: 1.8rem;
            }
            .card-label-swatch {
                width: 1rem;
                height: 1rem;
            }
            .card-label-hex {
                font-size: 0.45rem;
            }
            .card-label-name {
                font-size: 0.4rem;
            }
            #combo-lbl {
                font-size: 0.6rem;
            }
            #combo-mult {
                font-size: 0.6rem;
                min-width: 1.4rem;
            }
            #toast {
                font-size: 0.7rem;
                height: 1rem;
            }
            #win-title {
                font-size: 1rem;
            }
            #win-sub {
                font-size: 0.7rem;
            }
            #grid {
                gap: 0.35rem;
            }
            #game {
                gap: 0.4rem;
                padding: 0;
            }
            body {
                padding: 0.8rem 0.5rem;
            }
        }

        @media (max-width: 360px) {
            .swatch {
                width: 1.5rem;
                height: 1.5rem;
            }
            .card-label-hex {
                font-size: 0.4rem;
            }
            .card-label-name {
                font-size: 0.35rem;
            }
            .hval {
                font-size: 0.9rem;
            }
            #grid {
                gap: 0.25rem;
            }
        }

        /* ── landscape phone warning ── */
        @media (max-height: 500px) and (orientation: landscape) {
            #grid {
                gap: 0.3rem;
                max-width: 70vh;
                margin: 0 auto;
            }
            .swatch {
                width: 1.6rem;
                height: 1.6rem;
            }
            .card-label-hex {
                font-size: 0.4rem;
            }
            .card-label-name {
                font-size: 0.35rem;
            }
            .hval {
                font-size: 0.9rem;
            }
            #hud {
                gap: 0.2rem;
            }
            body {
                padding: 0.5rem 0.3rem;
            }
            #game {
                gap: 0.3rem;
            }
        }
    </style>
</head>

<body>
    <div id="game">
        <!-- HUD -->
        <div id="hud">
            <div class="hstat">
                <div class="hlbl">score</div>
                <div class="hval" id="score">0</div>
            </div>
            <div class="hstat">
                <div class="hlbl">pairs</div>
                <div class="hval" id="pairs">0/8</div>
            </div>
            <div class="hstat">
                <div class="hlbl">moves</div>
                <div class="hval" id="moves">0</div>
            </div>
            <button id="new-btn">New</button>
        </div>

        <!-- Combo -->
        <div id="combo-bar-wrap">
            <span id="combo-lbl">combo</span>
            <div id="combo-track"><div id="combo-fill"></div></div>
            <span id="combo-mult">x1</span>
        </div>

        <!-- Toast -->
        <div id="toast"></div>

        <!-- Grid -->
        <div id="grid"></div>

        <!-- Win -->
        <div id="win">
            <div id="win-title">palette cleared</div>
            <div id="win-sub"></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const COLORS = [
                { hex: '#e05c7a', name: 'rose' },
                { hex: '#87bcde', name: 'sky' },
                { hex: '#a07d93', name: 'mauve' },
                { hex: '#6abeaa', name: 'seafoam' },
                { hex: '#e8a97e', name: 'peach' },
                { hex: '#7fa3c8', name: 'steel' },
                { hex: '#c4a85a', name: 'gold' },
                { hex: '#8a7fce', name: 'lavender' },
            ];

            const COMBO_MSGS = ['nice', 'hot', 'on fire', 'unstoppable', 'legendary'];
            const MAX_COMBO = 5;
            const COMBO_COLORS = ['#6a8a9f', '#87bcde', '#a07d93', '#e8a97e', '#e05c7a', '#c4a85a'];

            // DOM refs
            const gridEl = document.getElementById('grid');
            const scoreEl = document.getElementById('score');
            const pairsEl = document.getElementById('pairs');
            const movesEl = document.getElementById('moves');
            const comboFill = document.getElementById('combo-fill');
            const comboMult = document.getElementById('combo-mult');
            const toastEl = document.getElementById('toast');
            const winEl = document.getElementById('win');
            const winSub = document.getElementById('win-sub');
            const newBtn = document.getElementById('new-btn');

            // state
            let flipped = [];
            let matchedCount = 0;
            let moves = 0;
            let score = 0;
            let combo = 0;
            let locked = false;
            let toastTimer = null;

            // helpers
            function shuffle(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function setCombo(n) {
                combo = Math.min(n, MAX_COMBO);
                const pct = (combo / MAX_COMBO) * 100;
                comboFill.style.width = pct + '%';
                comboFill.style.background = COMBO_COLORS[combo] || '#87bcde';
                comboMult.textContent = 'x' + (combo + 1);
            }

            function showToast(msg, color) {
                clearTimeout(toastTimer);
                toastEl.textContent = msg;
                toastEl.style.color = color || '#87bcde';
                toastEl.classList.add('show');
                toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1200);
            }

            function updateHud() {
                scoreEl.textContent = score;
                pairsEl.textContent = matchedCount + '/8';
                movesEl.textContent = moves;
            }

            function createCard(item) {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = item.id;

                let frontContent;
                if (item.type === 'swatch') {
                    frontContent = `<div class="swatch" style="background:${item.hex}"></div>`;
                } else {
                    frontContent = `
                        <div class="card-label-swatch" style="background:${item.hex}"></div>
                        <span class="card-label-hex">${item.hex}</span>
                        <span class="card-label-name">${item.name}</span>
                    `;
                }

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back"><div class="card-back-inner"></div></div>
                        <div class="card-front">${frontContent}</div>
                    </div>
                `;

                card.addEventListener('click', function(e) {
                    e.preventDefault();
                    flip(card);
                });

                // touch-friendly: prevent double-tap zoom
                card.addEventListener('touchstart', function(e) {
                    // just a passive touch — no extra work
                }, { passive: true });

                return card;
            }

            function init() {
                // reset state
                flipped = [];
                matchedCount = 0;
                moves = 0;
                score = 0;
                locked = false;
                setCombo(0);
                updateHud();
                winEl.classList.remove('show');
                toastEl.classList.remove('show');
                clearTimeout(toastTimer);

                const deck = shuffle([
                    ...COLORS.map((c, i) => ({ ...c, type: 'swatch', id: i })),
                    ...COLORS.map((c, i) => ({ ...c, type: 'label', id: i })),
                ]);

                gridEl.innerHTML = '';
                deck.forEach(item => gridEl.appendChild(createCard(item)));
            }

            function flip(card) {
                if (locked || flipped.length >= 2) return;
                if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

                card.classList.add('flipped');
                flipped.push(card);

                if (flipped.length < 2) return;

                moves++;
                locked = true;
                updateHud();

                const [a, b] = flipped;

                if (a.dataset.id === b.dataset.id) {
                    const gained = 100 * (combo + 1);
                    score += gained;
                    matchedCount++;
                    setCombo(combo + 1);

                    setTimeout(() => {
                        a.classList.replace('flipped', 'matched');
                        b.classList.replace('flipped', 'matched');
                        flipped = [];
                        locked = false;
                        updateHud();

                        const msg = combo > 1 ?
                            COMBO_MSGS[Math.min(combo - 2, COMBO_MSGS.length - 1)] + '  +' + gained :
                            '+' + gained;
                        showToast(msg, combo > 1 ? '#e8a97e' : null);

                        if (matchedCount === 8) {
                            setTimeout(() => {
                                winSub.textContent = score.toLocaleString() + ' pts · ' + moves + ' moves';
                                winEl.classList.add('show');
                            }, 300);
                        }
                    }, 280);

                } else {
                    // wrong match
                    setTimeout(() => { a.classList.add('wrong');
                        b.classList.add('wrong'); }, 10);
                    setCombo(0);
                    showToast('chain broken', '#e05c7a');

                    setTimeout(() => {
                        a.classList.remove('flipped', 'wrong');
                        b.classList.remove('flipped', 'wrong');
                        flipped = [];
                        locked = false;
                        updateHud();
                    }, 700);
                }
            }

            // event listeners
            newBtn.addEventListener('click', function(e) {
                e.preventDefault();
                init();
            });

            // start
            init();

        })();
    </script>
</body>
</html>
