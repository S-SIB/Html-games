<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 Космический шутер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            overflow: hidden;
            position: relative;
        }
        #gameWrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 9 / 16;
            background: #0a0a1a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 100, 255, 0.15);
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: none;
            background: transparent;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 10;
            padding: 20px;
        }
        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .overlay-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 20px;
        }
        .overlay-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            max-width: 320px;
            padding: 10px;
        }
        .game-title {
            font-size: clamp(36px, 8vw, 56px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 150, 255, 0.6);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .game-sub {
            font-size: clamp(16px, 3vw, 22px);
            color: rgba(255,255,255,0.6);
            margin-bottom: 24px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px 24px;
            margin: 8px 0;
            border: none;
            border-radius: 16px;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: manipulation;
            letter-spacing: 1px;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            box-shadow: 0 6px 0 #005bb5;
        }
        .btn-primary:active {
            box-shadow: 0 2px 0 #005bb5;
        }
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 6px 0 #922b21;
        }
        .btn-danger:active {
            box-shadow: 0 2px 0 #922b21;
        }
        .btn-success {
            background: linear-gradient(135deg, #00b894, #00cec9);
            box-shadow: 0 6px 0 #008b7a;
        }
        .btn-success:active {
            box-shadow: 0 2px 0 #008b7a;
        }
        .btn-sm {
            padding: 12px 20px;
            font-size: clamp(16px, 3vw, 20px);
            max-width: 220px;
            margin: 6px auto;
        }
        .info-text {
            color: rgba(255,255,255,0.7);
            font-size: clamp(14px, 2.5vw, 18px);
            margin: 6px 0;
        }
        .score-big {
            font-size: clamp(48px, 10vw, 72px);
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #hud.active {
            opacity: 1;
        }
        .hud-item {
            color: #fff;
            font-weight: 700;
            font-size: clamp(14px, 3.2vw, 20px);
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.4);
            padding: 4px 10px 4px 8px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .hud-item .value {
            min-width: 24px;
            text-align: center;
        }
        @media (max-width: 480px) {
            #gameWrapper {
                border-radius: 0;
                max-width: 100%;
                aspect-ratio: 9/16;
            }
            .overlay-bg {
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
<div id="gameWrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
        <div class="hud-item">❤️ <span class="value" id="livesDisplay">3</span></div>
        <div class="hud-item">⚡ <span class="value" id="weaponLevelDisplay">0</span></div>
        <div class="hud-item">🎯 <span class="value" id="scoreDisplay">0</span></div>
        <div class="hud-item">📈 <span class="value" id="levelDisplay">1</span></div>
        <div class="hud-item">🎯 <span class="value" id="enemyCount">0</span></div>
    </div>
    <div class="overlay active" id="menuOverlay">
        <div class="overlay-bg"></div>
        <div class="overlay-content">
            <div class="game-title">🚀 STAR<br>DEFENDER</div>
            <div class="game-sub">Сбей всех дронов!</div>
            <button class="btn btn-primary" id="btnStart">▶ СТАРТ</button>
            <div style="margin-top:16px;color:rgba(255,255,255,0.2);font-size:clamp(12px,2vw,14px);">
                👆 води пальцем, стреляем автоматически
            </div>
        </div>
    </div>
    <div class="overlay" id="gameOverOverlay">
        <div class="overlay-bg"></div>
        <div class="overlay-content">
            <div style="font-size:clamp(50px,12vw,80px);">💥</div>
            <div class="game-title" style="font-size:clamp(28px,6vw,42px);">ИГРА ОКОНЧЕНА</div>
            <div class="score-big" id="finalScore">0</div>
            <div class="info-text">очков</div>
            <button class="btn btn-primary btn-sm" id="btnRestart">🔄 ЗАНОВО</button>
            <button class="btn btn-sm" id="btnMenu" style="background:rgba(255,255,255,0.1);box-shadow:none;color:rgba(255,255,255,0.5);">📋 МЕНЮ</button>
        </div>
    </div>
    <div class="overlay" id="winOverlay">
        <div class="overlay-bg"></div>
        <div class="overlay-content">
            <div style="font-size:clamp(50px,12vw,80px);">🏆</div>
            <div class="game-title" style="font-size:clamp(28px,6vw,42px);">ПОБЕДА!</div>
            <div class="score-big" id="winScore">0</div>
            <div class="info-text">очков</div>
            <button class="btn btn-success btn-sm" id="btnWinRestart">🔄 ЕЩЁ РАЗ</button>
            <button class="btn btn-sm" id="btnWinMenu" style="background:rgba(255,255,255,0.1);box-shadow:none;color:rgba(255,255,255,0.5);">📋 МЕНЮ</button>
        </div>
    </div>
</div>
<script>
    (function(){
        'use strict';
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('gameWrapper');
        let W, H;
        function resize() {
            const rect = wrapper.getBoundingClientRect();
            canvas.width = rect.width * (window.devicePixelRatio || 1);
            canvas.height = rect.height * (window.devicePixelRatio || 1);
            W = canvas.width;
            H = canvas.height;
            ctx.scale(1,1);
        }
        resize();
        window.addEventListener('resize', resize);

        const livesDisplay = document.getElementById('livesDisplay');
        const weaponLevelDisplay = document.getElementById('weaponLevelDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const enemyCountDisplay = document.getElementById('enemyCount');
        const hud = document.getElementById('hud');
        const menuOverlay = document.getElementById('menuOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const winOverlay = document.getElementById('winOverlay');
        const finalScore = document.getElementById('finalScore');
        const winScore = document.getElementById('winScore');
        const btnStart = document.getElementById('btnStart');
        const btnRestart = document.getElementById('btnRestart');
        const btnMenu = document.getElementById('btnMenu');
        const btnWinRestart = document.getElementById('btnWinRestart');
        const btnWinMenu = document.getElementById('btnWinMenu');

        // ----- ЗВУКИ -----
        class Sound {
            constructor() {
                this.ctx = null;
                this.enabled = true;
                try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { this.enabled = false; }
                this.initialized = false;
            }
            init() {
                if (this.initialized || !this.enabled) return;
                if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
                this.initialized = true;
            }
            _play(params) {
                if (!this.enabled || !this.ctx) return;
                try {
                    const now = this.ctx.currentTime;
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    const { type='sine', freq=440, duration=0.15, volume=0.3, freqEnd=null, ramp='exponential' } = params;
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, now);
                    if (freqEnd !== null) {
                        if (ramp === 'exponential') osc.frequency.exponentialRampToValueAtTime(freqEnd, now+duration);
                        else osc.frequency.linearRampToValueAtTime(freqEnd, now+duration);
                    }
                    gain.gain.setValueAtTime(Math.min(volume,0.8), now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now+duration);
                    osc.start(now);
                    osc.stop(now+duration);
                } catch(e) {}
            }
            shoot() { this.init(); this._play({ type:'square', freq:800, duration:0.05, volume:0.15, freqEnd:600, ramp:'linear' }); }
            enemyHit() {
                this.init();
                this._play({ type:'sawtooth', freq:300, duration:0.15, volume:0.25, freqEnd:100, ramp:'exponential' });
                setTimeout(() => { this._play({ type:'sine', freq:600, duration:0.1, volume:0.15, freqEnd:900, ramp:'linear' }); }, 60);
            }
            loseLife() { this.init(); this._play({ type:'sawtooth', freq:400, duration:0.3, volume:0.3, freqEnd:120, ramp:'exponential' }); }
            levelUp() {
                this.init();
                const notes = [523, 659, 784];
                notes.forEach((f,i) => { setTimeout(() => { this._play({ type:'sine', freq:f, duration:0.15, volume:0.2, freqEnd:f*1.1, ramp:'linear' }); }, i*100); });
            }
            gameOver() {
                this.init();
                const notes = [523, 440, 370, 294];
                notes.forEach((f,i) => { setTimeout(() => { this._play({ type:'sine', freq:f, duration:0.2, volume:0.2-i*0.03, freqEnd:f*0.7, ramp:'exponential' }); }, i*150); });
            }
            win() {
                this.init();
                const notes = [523, 659, 784, 1047];
                notes.forEach((f,i) => { setTimeout(() => { this._play({ type:'sine', freq:f, duration:0.15, volume:0.25, freqEnd:f*1.05, ramp:'linear' }); }, i*80); });
            }
            powerup() {
                this.init();
                this._play({ type:'sine', freq:880, duration:0.1, volume:0.2, freqEnd:1200, ramp:'linear' });
                setTimeout(() => { this._play({ type:'sine', freq:660, duration:0.1, volume:0.15, freqEnd:880, ramp:'linear' }); }, 80);
            }
            enemyShoot() { this.init(); this._play({ type:'sawtooth', freq:200, duration:0.07, volume:0.1, freqEnd:100, ramp:'linear' }); }
            enemyPassed() { this.init(); this._play({ type:'square', freq:300, duration:0.2, volume:0.2, freqEnd:150, ramp:'exponential' }); }
        }
        const sound = new Sound();

        // ----- ИГРОВОЕ СОСТОЯНИЕ -----
        const G = {
            state: 'menu',
            level: 1,
            maxLevel: 5,
            score: 0,
            lives: 3,
            player: null,
            enemies: [],
            bullets: [],
            enemyBullets: [],
            particles: [],
            powerups: [],
            enemySpawnTimer: 0,
            enemySpawnInterval: 1.8,
            enemiesSpawned: 0,
            enemiesKilled: 0,
            totalEnemies: 10,
            shootTimer: 0,
            elapsed: 0,
            lastTime: 0,
            animId: null,
            isRunning: false,
            enemySpeed: 300,
            isLevelTransitioning: false,
            weaponLevel: 0,
            maxWeaponLevel: 9,
        };

        // ----- КОНФИГУРАЦИЯ ОРУЖИЯ (10 уровней, интервал от 0.8 до 0.2) -----
        function getWeaponConfig(level) {
            const configs = [
                { count: 1, interval: 0.8 },
                { count: 1, interval: 0.7 },
                { count: 2, interval: 0.6 },
                { count: 2, interval: 0.5 },
                { count: 3, interval: 0.45 },
                { count: 3, interval: 0.4 },
                { count: 4, interval: 0.35 },
                { count: 4, interval: 0.3 },
                { count: 5, interval: 0.25 },
                { count: 6, interval: 0.2 }
            ];
            return configs[Math.min(level, configs.length-1)] || configs[0];
        }

        // ----- ИГРОК -----
        class Player {
            constructor() {
                this.radius = Math.min(W,H)*0.045;
                this.x = W/2;
                this.y = H - this.radius*4;
            }
            update(dt) {
                this.x = Math.max(this.radius, Math.min(W-this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(H-this.radius, this.y));
            }
            draw(ctx) {
                const r = this.radius;
                ctx.save();
                ctx.translate(this.x, this.y);
                const grad = ctx.createRadialGradient(0,0,0,0,0,r*2);
                grad.addColorStop(0,'rgba(0,150,255,0.15)');
                grad.addColorStop(1,'rgba(0,150,255,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0,0,r*2,0,Math.PI*2);
                ctx.fill();
                ctx.shadowColor = '#00aaff';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#4af';
                ctx.beginPath();
                ctx.moveTo(0, -r*1.5);
                ctx.lineTo(-r, r*0.8);
                ctx.lineTo(-r*0.4, r*0.4);
                ctx.lineTo(0, r*0.6);
                ctx.lineTo(r*0.4, r*0.4);
                ctx.lineTo(r, r*0.8);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#8cf';
                ctx.beginPath();
                ctx.arc(0, -r*0.3, r*0.35, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#ff8800';
                ctx.shadowColor = '#ff8800';
                ctx.shadowBlur = 15;
                for (let side = -1; side<=1; side+=2) {
                    ctx.beginPath();
                    ctx.arc(side*r*0.45, r*0.8, r*0.2, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.restore();
            }
            getBounds() { return { x:this.x, y:this.y, radius:this.radius*0.7 }; }
        }

        // ----- ВРАГ -----
        class Enemy {
            constructor(x, y, speed, level) {
                this.x = x;
                this.y = y;
                this.speed = speed;
                this.radius = Math.min(W,H)*0.035;
                this.alive = true;
                this.hitAnim = 0;
                this.angle = 0;
                this.dodgeTimer = 0;
                this.dodgeDirection = Math.random()>0.5?1:-1;
                this.dodgeSpeed = 150+Math.random()*100;
                this.dodgeDuration = 0.3+Math.random()*0.5;
                this.dodgeCooldown = 1+Math.random()*1.5;
                this.state = 'straight';
                this.shootTimer = 0;
                const baseInterval = 2.2;
                const interval = Math.max(0.5, baseInterval - level * 0.12);
                this.shootInterval = interval + (Math.random()*0.3 - 0.15);
                this.canShoot = level >= 3;
            }
            update(dt, level) {
                this.y += this.speed * dt;
                this.dodgeTimer += dt;
                if (this.state === 'straight') {
                    if (this.dodgeTimer > this.dodgeCooldown) {
                        this.state = 'dodging';
                        this.dodgeTimer = 0;
                        this.dodgeDirection = Math.random()>0.5?1:-1;
                        this.dodgeDuration = 0.3+Math.random()*0.5;
                        this.dodgeSpeed = 150+Math.random()*150;
                    }
                } else if (this.state === 'dodging') {
                    this.x += this.dodgeDirection * this.dodgeSpeed * dt;
                    if (this.dodgeTimer > this.dodgeDuration) {
                        this.state = 'straight';
                        this.dodgeTimer = 0;
                        this.dodgeCooldown = 0.5+Math.random()*1.0;
                    }
                }
                this.x = Math.max(this.radius, Math.min(W-this.radius, this.x));
                this.angle += dt*3;
                if (this.hitAnim > 0) this.hitAnim -= dt;

                if (this.canShoot && this.alive) {
                    this.shootTimer += dt;
                    if (this.shootTimer >= this.shootInterval) {
                        this.shootTimer = 0;
                        return true;
                    }
                }
                return false;
            }
            draw(ctx) {
                const r = this.radius;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.shadowColor = '#ff4444';
                ctx.shadowBlur = this.hitAnim>0 ? 40 : 10;
                ctx.fillStyle = this.hitAnim>0 ? '#ff6666' : '#ff3333';
                ctx.strokeStyle = '#ff8888';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i=0; i<6; i++) {
                    const a = i/6*Math.PI*2 - Math.PI/2 + this.angle*0.2;
                    const px = Math.cos(a)*r;
                    const py = Math.sin(a)*r;
                    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#ff6666';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(-r*0.3, -r*0.3);
                ctx.lineTo(-r*0.6, -r*0.9);
                ctx.moveTo(r*0.3, -r*0.3);
                ctx.lineTo(r*0.6, -r*0.9);
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-r*0.3, -r*0.1, r*0.2, 0, Math.PI*2);
                ctx.arc(r*0.3, -r*0.1, r*0.2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#00f';
                ctx.beginPath();
                ctx.arc(-r*0.3, -r*0.1, r*0.08, 0, Math.PI*2);
                ctx.arc(r*0.3, -r*0.1, r*0.08, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
            getBounds() { return { x:this.x, y:this.y, radius:this.radius*0.7 }; }
        }

        // ----- ПУЛИ ИГРОКА -----
        class Bullet {
            constructor(x,y) {
                this.x=x; this.y=y;
                this.radius = Math.min(W,H)*0.012;
                this.speed = -800;
                this.alive = true;
                this.trail = [];
            }
            update(dt) {
                this.trail.push({x:this.x,y:this.y});
                if (this.trail.length>8) this.trail.shift();
                this.y += this.speed*dt;
                if (this.y < -20) this.alive = false;
            }
            draw(ctx) {
                for (let i=0; i<this.trail.length; i++) {
                    const alpha = i/this.trail.length*0.5;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, this.radius*(i/this.trail.length), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(0,200,255,${alpha})`;
                    ctx.fill();
                }
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#0cf';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            getBounds() { return { x:this.x, y:this.y, radius:this.radius }; }
        }

        // ----- ПУЛИ ВРАГОВ -----
        class EnemyBullet {
            constructor(x, y, speed) {
                this.x = x;
                this.y = y;
                this.radius = Math.min(W,H)*0.015;
                this.speed = speed;
                this.alive = true;
                this.angle = 0;
            }
            update(dt) {
                this.y += this.speed * dt;
                this.angle += dt*5;
                if (this.y > H+30) this.alive = false;
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.shadowColor = '#ff4444';
                ctx.shadowBlur = 12;
                ctx.fillStyle = '#ff6644';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffaa44';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius*0.5, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
            getBounds() { return { x:this.x, y:this.y, radius:this.radius*0.8 }; }
        }

        // ----- БОНУС -----
        class Powerup {
            constructor(x,y) {
                this.x=x; this.y=y;
                this.radius = Math.min(W,H)*0.025;
                this.speed = 120;
                this.alive = true;
                this.type = 'weapon';
                this.angle = 0;
            }
            update(dt) {
                this.y += this.speed*dt;
                this.angle += dt*2;
                if (this.y > H+30) this.alive = false;
            }
            draw(ctx) {
                const r = this.radius;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                for (let i=0; i<10; i++) {
                    const a = (i/10)*Math.PI*2 - Math.PI/2;
                    const rad = i%2===0 ? r : r*0.45;
                    const px = Math.cos(a)*rad;
                    const py = Math.sin(a)*rad;
                    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
                }
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = `${r*1.2}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⬆', 0, 0);
                ctx.restore();
            }
            getBounds() { return { x:this.x, y:this.y, radius:this.radius*0.7 }; }
        }

        // ----- ВСПОМОГАТЕЛЬНЫЕ -----
        function spawnExplosion(x,y,color='#ff8800',count=25) {
            for (let i=0; i<count; i++) {
                const angle = Math.random()*Math.PI*2;
                const speed = 80+Math.random()*200;
                const size = 2+Math.random()*6;
                G.particles.push({
                    x,y,
                    vx:Math.cos(angle)*speed,
                    vy:Math.sin(angle)*speed,
                    radius:size,
                    color:color,
                    life:0.5+Math.random()*0.5,
                    maxLife:0.5+Math.random()*0.5,
                    gravity:80
                });
            }
        }
        function spawnPowerup(x,y) {
            G.powerups.push(new Powerup(x,y));
        }

        // ----- УРОВНИ -----
        function getLevelConfig(level) {
            const base = 8;
            const enemies = base + (level-1)*5;
            const speed = 350 + (level-1)*20;
            const spawnInterval = Math.max(0.4, 1.2 - (level-1)*0.08);
            return { enemies, speed, spawnInterval };
        }

        function startLevel(level) {
            const cfg = getLevelConfig(level);
            G.totalEnemies = cfg.enemies;
            G.enemiesSpawned = 0;
            G.enemiesKilled = 0;
            G.enemySpawnInterval = cfg.spawnInterval;
            G.enemySpawnTimer = 0;
            G.shootTimer = 0;
            G.enemies = [];
            G.bullets = [];
            G.enemyBullets = [];
            G.particles = [];
            G.powerups = [];
            G.enemySpeed = cfg.speed;
            G.isLevelTransitioning = false;
            levelDisplay.textContent = level;
            sound.levelUp();
            updateEnemyCounter();
            updateUI();
        }

        function updateEnemyCounter() {
            const rem = G.totalEnemies - G.enemiesKilled;
            enemyCountDisplay.textContent = rem>0 ? rem : 0;
        }

        // ----- ИНИЦИАЛИЗАЦИЯ -----
        function initGame() {
            G.player = new Player();
            G.lives = 3;
            G.score = 0;
            G.level = 1;
            G.state = 'playing';
            G.isRunning = true;
            G.elapsed = 0;
            G.isLevelTransitioning = false;
            G.weaponLevel = 0;
            G.enemies = [];
            G.bullets = [];
            G.enemyBullets = [];
            G.particles = [];
            G.powerups = [];
            updateUI();
            startLevel(G.level);
            hud.classList.add('active');
            menuOverlay.classList.remove('active');
            gameOverOverlay.classList.remove('active');
            winOverlay.classList.remove('active');
            if (G.animId) cancelAnimationFrame(G.animId);
            G.lastTime = performance.now();
            G.animId = requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            livesDisplay.textContent = G.lives;
            scoreDisplay.textContent = G.score;
            levelDisplay.textContent = G.level;
            weaponLevelDisplay.textContent = G.weaponLevel;
            updateEnemyCounter();
        }

        function gameOver() {
            if (G.state === 'gameover') return;
            G.state = 'gameover';
            G.isRunning = false;
            if (G.animId) cancelAnimationFrame(G.animId);
            sound.gameOver();
            finalScore.textContent = G.score;
            gameOverOverlay.classList.add('active');
            hud.classList.remove('active');
        }

        function winGame() {
            if (G.state === 'win') return;
            G.state = 'win';
            G.isRunning = false;
            if (G.animId) cancelAnimationFrame(G.animId);
            sound.win();
            winScore.textContent = G.score;
            winOverlay.classList.add('active');
            hud.classList.remove('active');
        }

        function rectCollide(a,b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            return Math.hypot(dx,dy) < a.radius + b.radius;
        }

        function checkLevelComplete() {
            if (G.state !== 'playing') return;
            if (G.isLevelTransitioning) return;
            if (G.enemiesKilled >= G.totalEnemies && G.enemies.length === 0) {
                G.isLevelTransitioning = true;
                if (G.level >= G.maxLevel) {
                    winGame();
                } else {
                    G.level++;
                    startLevel(G.level);
                    updateUI();
                }
            }
        }

        function applyPowerup(p) {
            if (p.type === 'weapon') {
                if (G.weaponLevel < G.maxWeaponLevel) {
                    G.weaponLevel++;
                    sound.powerup();
                    spawnExplosion(p.x, p.y, '#ffd700', 15);
                    updateUI();
                } else {
                    G.score += 20;
                    updateUI();
                    spawnExplosion(p.x, p.y, '#ffaa00', 10);
                }
            }
            p.alive = false;
        }

        // ----- ФУНКЦИЯ ПОТЕРИ ЖИЗНИ ОТ ПРОЛЕТЕВШЕГО ВРАГА (враг возвращается) -----
        function loseLifeFromEscapedEnemy(x, y) {
            if (G.state !== 'playing') return;
            G.lives--;
            updateUI();
            sound.enemyPassed();
            spawnExplosion(x, y, '#ff4444', 20);
            if (G.lives <= 0) {
                gameOver();
            }
        }

        // ----- ОБНОВЛЕНИЕ -----
        function update(dt) {
            G.elapsed += dt;
            G.player.update(dt);

            const wCfg = getWeaponConfig(G.weaponLevel);
            const shootInterval = wCfg.interval;
            const bulletCount = wCfg.count;

            G.shootTimer += dt;
            if (G.shootTimer >= shootInterval) {
                G.shootTimer = 0;
                const p = G.player;
                const spread = p.radius * 0.35;
                const startY = p.y - p.radius*1.2;
                if (bulletCount === 1) {
                    G.bullets.push(new Bullet(p.x, startY));
                } else if (bulletCount === 2) {
                    G.bullets.push(new Bullet(p.x - spread, startY));
                    G.bullets.push(new Bullet(p.x + spread, startY));
                } else if (bulletCount === 3) {
                    G.bullets.push(new Bullet(p.x - spread, startY));
                    G.bullets.push(new Bullet(p.x, startY - p.radius*0.3));
                    G.bullets.push(new Bullet(p.x + spread, startY));
                } else if (bulletCount === 4) {
                    G.bullets.push(new Bullet(p.x - spread*1.5, startY));
                    G.bullets.push(new Bullet(p.x - spread*0.5, startY - p.radius*0.2));
                    G.bullets.push(new Bullet(p.x + spread*0.5, startY - p.radius*0.2));
                    G.bullets.push(new Bullet(p.x + spread*1.5, startY));
                } else if (bulletCount === 5) {
                    G.bullets.push(new Bullet(p.x - spread*2, startY));
                    G.bullets.push(new Bullet(p.x - spread, startY - p.radius*0.2));
                    G.bullets.push(new Bullet(p.x, startY - p.radius*0.4));
                    G.bullets.push(new Bullet(p.x + spread, startY - p.radius*0.2));
                    G.bullets.push(new Bullet(p.x + spread*2, startY));
                } else if (bulletCount >= 6) {
                    G.bullets.push(new Bullet(p.x - spread*2.5, startY));
                    G.bullets.push(new Bullet(p.x - spread*1.2, startY - p.radius*0.3));
                    G.bullets.push(new Bullet(p.x - spread*0.4, startY - p.radius*0.5));
                    G.bullets.push(new Bullet(p.x + spread*0.4, startY - p.radius*0.5));
                    G.bullets.push(new Bullet(p.x + spread*1.2, startY - p.radius*0.3));
                    G.bullets.push(new Bullet(p.x + spread*2.5, startY));
                }
                sound.shoot();
            }

            // Спавн врагов
            if (G.enemiesSpawned < G.totalEnemies) {
                G.enemySpawnTimer += dt;
                if (G.enemySpawnTimer >= G.enemySpawnInterval) {
                    G.enemySpawnTimer = 0;
                    const x = 30 + Math.random()*(W-60);
                    const speed = G.enemySpeed + Math.random()*50;
                    const enemy = new Enemy(x, -30, speed, G.level);
                    G.enemies.push(enemy);
                    G.enemiesSpawned++;
                }
            }

            // Обновление врагов
            for (let i=G.enemies.length-1; i>=0; i--) {
                const e = G.enemies[i];
                const shouldShoot = e.update(dt, G.level);
                if (!e.alive) {
                    G.enemies.splice(i,1);
                    continue;
                }

                // Если враг ушёл за нижнюю границу — отнимаем жизнь и возвращаем наверх
                if (e.y > H + 50) {
                    if (G.state === 'playing') {
                        loseLifeFromEscapedEnemy(e.x, H - 20);
                        if (G.state === 'gameover') return;
                    }
                    // Возвращаем врага наверх
                    e.y = -30;
                    e.x = 30 + Math.random()*(W-60);
                    e.dodgeTimer = 0;
                    e.shootTimer = 0;
                    e.state = 'straight';
                    e.alive = true;
                    e.hitAnim = 0;
                    continue;
                }

                // Столкновение с игроком — засчитываем как убийство
                if (rectCollide(G.player.getBounds(), e.getBounds())) {
                    e.alive = false;
                    G.enemies.splice(i,1);
                    G.lives--;
                    G.enemiesKilled++;          // засчитываем убитого
                    updateUI();                  // обновит счётчик
                    sound.loseLife();
                    spawnExplosion(e.x, e.y, '#ff3333', 30);
                    if (G.lives <= 0) {
                        gameOver();
                        return;
                    }
                    continue;
                }

                // Стрельба врага
                if (shouldShoot && e.alive) {
                    const bulletSpeed = 200 + G.level * 20;
                    const eb = new EnemyBullet(e.x, e.y + e.radius, bulletSpeed);
                    G.enemyBullets.push(eb);
                    sound.enemyShoot();
                }
            }

            // Пули игрока vs враги
            for (let i=G.bullets.length-1; i>=0; i--) {
                const b = G.bullets[i];
                b.update(dt);
                if (!b.alive) { G.bullets.splice(i,1); continue; }
                let used = false;
                for (let j=G.enemies.length-1; j>=0; j--) {
                    const e = G.enemies[j];
                    if (rectCollide(b.getBounds(), e.getBounds())) {
                        e.alive = false;
                        G.enemies.splice(j,1);
                        used = true;
                        G.score += 10 + Math.floor(G.level*2);
                        updateUI();
                        sound.enemyHit();
                        spawnExplosion(b.x, b.y, '#ffaa00', 20);
                        G.enemiesKilled++;
                        updateEnemyCounter();
                        if (Math.random() < 0.12) {
                            spawnPowerup(b.x, b.y);
                        }
                        break;
                    }
                }
                if (used) G.bullets.splice(i,1);
            }

            // Вражеские пули vs игрок
            for (let i=G.enemyBullets.length-1; i>=0; i--) {
                const eb = G.enemyBullets[i];
                eb.update(dt);
                if (!eb.alive) { G.enemyBullets.splice(i,1); continue; }
                if (rectCollide(G.player.getBounds(), eb.getBounds())) {
                    eb.alive = false;
                    G.enemyBullets.splice(i,1);
                    G.lives--;
                    updateUI();
                    sound.loseLife();
                    spawnExplosion(eb.x, eb.y, '#ff4444', 15);
                    if (G.lives <= 0) {
                        gameOver();
                        return;
                    }
                    continue;
                }
                if (eb.y > H+30) { eb.alive = false; G.enemyBullets.splice(i,1); }
            }

            // Бонусы
            for (let i=G.powerups.length-1; i>=0; i--) {
                const p = G.powerups[i];
                p.update(dt);
                if (!p.alive) { G.powerups.splice(i,1); continue; }
                if (rectCollide(G.player.getBounds(), p.getBounds())) {
                    applyPowerup(p);
                    G.powerups.splice(i,1);
                    continue;
                }
                if (p.y > H+30) { p.alive = false; G.powerups.splice(i,1); }
            }

            // Частицы
            for (let i=G.particles.length-1; i>=0; i--) {
                const p = G.particles[i];
                p.x += p.vx*dt;
                p.y += p.vy*dt;
                p.vy += p.gravity*dt;
                p.life -= dt;
                if (p.life <= 0) G.particles.splice(i,1);
            }

            checkLevelComplete();
        }

        // ----- РЕНДЕР -----
        function render() {
            ctx.clearRect(0,0,W,H);
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0,0,W,H);
            ctx.fillStyle = '#fff';
            for (let i=0; i<80; i++) {
                const x = (i*137.5+50)%W;
                const y = (i*97.3+G.elapsed*20)%H;
                const r = 0.5+(i%3)*0.5;
                ctx.globalAlpha = 0.4+0.6*(i%5)/5;
                ctx.beginPath();
                ctx.arc(x,y,r,0,Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            for (const b of G.bullets) b.draw(ctx);
            for (const e of G.enemies) e.draw(ctx);
            for (const p of G.powerups) p.draw(ctx);
            for (const eb of G.enemyBullets) eb.draw(ctx);
            if (G.player) G.player.draw(ctx);
            for (const p of G.particles) {
                const alpha = p.life/p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius*(0.2+0.8*alpha), 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            if (G.state === 'playing') {
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.font = `${Math.min(W,H)*0.025}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('👆 води для движения', W/2, H-20);
            }
        }

        // ----- LOOP -----
        function gameLoop(timestamp) {
            if (!G.isRunning) return;
            const dt = Math.min((timestamp - G.lastTime)/1000, 0.05);
            G.lastTime = timestamp;
            update(dt);
            render();
            G.animId = requestAnimationFrame(gameLoop);
        }

        // ----- УПРАВЛЕНИЕ -----
        function handlePointer(x,y) {
            if (G.state !== 'playing' || !G.player) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width/rect.width;
            const scaleY = canvas.height/rect.height;
            const cx = (x - rect.left)*scaleX;
            const cy = (y - rect.top)*scaleY;
            G.player.x = Math.max(G.player.radius, Math.min(W-G.player.radius, cx));
            G.player.y = Math.max(G.player.radius, Math.min(H-G.player.radius, cy));
        }

        function handleStart(e) {
            e.preventDefault();
            sound.init();
            const rect = canvas.getBoundingClientRect();
            let cx,cy;
            if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            else { cx = e.clientX; cy = e.clientY; }
            handlePointer(cx,cy);
        }
        function handleMove(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            let cx,cy;
            if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            else { if (e.buttons !== 1) return; cx = e.clientX; cy = e.clientY; }
            handlePointer(cx,cy);
        }
        function handleEnd(e) { e.preventDefault(); }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);
        canvas.addEventListener('touchstart', handleStart, { passive:false });
        canvas.addEventListener('touchmove', handleMove, { passive:false });
        canvas.addEventListener('touchend', handleEnd, { passive:false });
        canvas.addEventListener('touchcancel', handleEnd, { passive:false });
        canvas.addEventListener('contextmenu', e=>e.preventDefault());

        // ----- КНОПКИ -----
        btnStart.addEventListener('click', ()=>{ initGame(); });
        btnRestart.addEventListener('click', ()=>{ initGame(); });
        btnMenu.addEventListener('click', ()=>{
            G.state = 'menu';
            G.isRunning = false;
            if (G.animId) cancelAnimationFrame(G.animId);
            gameOverOverlay.classList.remove('active');
            winOverlay.classList.remove('active');
            hud.classList.remove('active');
            menuOverlay.classList.add('active');
            G.enemies = []; G.bullets = []; G.enemyBullets = []; G.particles = []; G.powerups = [];
        });
        btnWinRestart.addEventListener('click', ()=>{ initGame(); });
        btnWinMenu.addEventListener('click', ()=>{
            G.state = 'menu';
            G.isRunning = false;
            if (G.animId) cancelAnimationFrame(G.animId);
            winOverlay.classList.remove('active');
            gameOverOverlay.classList.remove('active');
            hud.classList.remove('active');
            menuOverlay.classList.add('active');
            G.enemies = []; G.bullets = []; G.enemyBullets = []; G.particles = []; G.powerups = [];
        });

        document.addEventListener('keydown', (e)=>{
            if (e.key===' '||e.key==='Enter') {
                if (G.state==='menu') btnStart.click();
                else if (G.state==='gameover') btnRestart.click();
                else if (G.state==='win') btnWinRestart.click();
            }
            if (e.key==='m'||e.key==='M') {
                if (G.state==='gameover') btnMenu.click();
                else if (G.state==='win') btnWinMenu.click();
            }
        });

        menuOverlay.classList.add('active');
        hud.classList.remove('active');
        G.state = 'menu';
        document.addEventListener('click', ()=>sound.init(), { once:true });
        document.addEventListener('touchstart', ()=>sound.init(), { once:true });

        console.log('🚀 Космический шутер — исправлена логика столкновений');
        console.log('💥 Врезавшийся враг засчитывается как убитый.');
        console.log('⚠️ Пропущенные враги отнимают жизнь и возвращаются.');
        console.log('⚡ Оружие улучшается навсегда (10 уровней).');
        console.log('⭐ Собирай звёзды для апгрейда.');
    })();
</script>
</body>
