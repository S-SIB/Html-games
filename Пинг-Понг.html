<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пинг-понг</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            background: #0b1120;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            height: 100dvh;
            max-height: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px;
            touch-action: none;
        }

        /* Панель управления (ползунок) — теперь сверху */
        .control-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 4px 10px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 6px; /* отступ от canvas */
        }

        .control-panel.hidden {
            display: none;
        }

        .control-panel label {
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(11px, 2vw, 14px);
            white-space: nowrap;
            font-weight: 500;
        }

        .control-panel input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.15);
            outline: none;
            transition: background 0.2s;
            touch-action: none;
        }

        .control-panel input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #facc15;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            touch-action: none;
        }

        .control-panel input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #facc15;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.2);
            touch-action: none;
        }

        .control-panel .speed-value {
            color: #facc15;
            font-size: clamp(14px, 3vw, 20px);
            font-weight: 700;
            min-width: 40px;
            text-align: center;
        }

        .canvas-container {
            position: relative;
            flex: 1 1 auto;
            width: 100%;
            min-height: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            touch-action: none;
        }

        .canvas-container canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0b1120;
            touch-action: none;
        }

        /* Overlay */
        .overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 14px;
            padding: 20px;
            z-index: 10;
            animation: fadeIn 0.25s ease;
            gap: 10px;
        }

        .overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .overlay .big-icon {
            font-size: clamp(44px, 11vw, 70px);
            line-height: 1;
        }

        .overlay .title {
            color: #fff;
            font-size: clamp(26px, 6vw, 42px);
            font-weight: 800;
            text-align: center;
        }

        .overlay .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(14px, 3.5vw, 22px);
            text-align: center;
        }

        .overlay .final-score {
            color: #facc15;
            font-size: clamp(30px, 7vw, 50px);
            font-weight: 800;
            text-shadow: 0 0 30px rgba(250, 204, 21, 0.25);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
            width: 100%;
            max-width: 280px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-size: clamp(15px, 3.5vw, 22px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            touch-action: manipulation;
            letter-spacing: 0.3px;
            flex: 1 1 auto;
            min-width: 80px;
            text-align: center;
            background: #2dd4bf;
            color: #0f172a;
            box-shadow: 0 4px 20px rgba(45, 212, 191, 0.25);
        }

        .btn:active {
            transform: scale(0.94);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-primary {
            background: #facc15;
            color: #0f172a;
            box-shadow: 0 4px 20px rgba(250, 204, 21, 0.2);
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 80%;
            max-width: 240px;
        }

        .menu-options .btn {
            width: 100%;
            text-align: center;
        }

        .hint {
            color: rgba(255, 255, 255, 0.25);
            font-size: clamp(10px, 2vw, 13px);
            text-align: center;
            flex-shrink: 0;
            margin-top: 4px;
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .game-wrapper {
                padding: 4px;
            }
            .hint {
                display: none;
            }
            .control-panel {
                padding: 2px 8px;
                margin-bottom: 4px;
            }
            .control-panel input[type="range"]::-webkit-slider-thumb {
                width: 14px;
                height: 14px;
            }
            .control-panel input[type="range"]::-moz-range-thumb {
                width: 14px;
                height: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper" id="gameWrapper">

        <!-- Панель управления (ползунок скорости бота) — теперь СВЕРХУ -->
        <div class="control-panel" id="controlPanel">
            <label for="aiSpeed">Скорость бота</label>
            <input type="range" id="aiSpeed" min="0.5" max="5.5" step="0.1" value="3.0">
            <span class="speed-value" id="speedDisplay">3.0%</span>
        </div>

        <div class="canvas-container" id="canvasContainer">
            <canvas id="gameCanvas"></canvas>

            <!-- Menu Overlay -->
            <div class="overlay show" id="menuOverlay">
                <div class="big-icon">🏓</div>
                <div class="title">Пинг-понг</div>
                <div class="sub">Выберите режим</div>
                <div class="menu-options">
                    <button class="btn btn-primary" data-mode="bot">🤖 С ботом</button>
                    <button class="btn btn-primary" data-mode="friend">👫 С другом</button>
                </div>
            </div>

            <!-- Game Over Overlay -->
            <div class="overlay" id="gameOverOverlay">
                <div class="big-icon" id="overlayIcon">🏆</div>
                <div class="title" id="overlayTitle">Игра окончена</div>
                <div class="sub" id="overlaySub">Победитель</div>
                <div class="final-score" id="finalScore">0 : 0</div>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="menuBtn">🏠 В меню</button>
                    <button class="btn btn-primary" id="restartBtn">↻ Ещё раз</button>
                </div>
            </div>
        </div>

        <div class="hint" id="hintText">👆 Ведите пальцем по экрану, чтобы двигать ракетку</div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // DOM
            // ============================================================
            const canvas = document.getElementById('gameCanvas');
            const container = document.getElementById('canvasContainer');
            const menuOverlay = document.getElementById('menuOverlay');
            const gameOverOverlay = document.getElementById('gameOverOverlay');
            const overlayIcon = document.getElementById('overlayIcon');
            const overlayTitle = document.getElementById('overlayTitle');
            const overlaySub = document.getElementById('overlaySub');
            const finalScore = document.getElementById('finalScore');
            const restartBtn = document.getElementById('restartBtn');
            const menuBtn = document.getElementById('menuBtn');
            const hintText = document.getElementById('hintText');
            const controlPanel = document.getElementById('controlPanel');
            const aiSpeedSlider = document.getElementById('aiSpeed');
            const speedDisplay = document.getElementById('speedDisplay');

            // ============================================================
            // Параметры игры
            // ============================================================
            let W = 0,
                H = 0;
            let paddleW = 0,
                paddleH = 0;
            let ballR = 0;

            let playerPaddle = { x: 0, y: 0 };
            let enemyPaddle = { x: 0, y: 0 };
            let ball = { x: 0, y: 0, dx: 0, dy: 0 };

            let scorePlayer = 0;
            let scoreEnemy = 0;
            let gameMode = 'bot';
            let running = false;
            let gameOver = false;
            let animId = null;

            let touchId = null;
            let touchTarget = null;
            let targetX = null;

            const WIN_SCORE = 10;
            const BALL_SPEED_INIT = 3.5;
            const MAX_BALL_SPEED = 9;
            const BALL_SPEED_INC = 0.15;

            // Динамическая скорость бота (в процентах от ширины поля)
            let aiSpeedPercent = 3.0;

            function getAiSpeedFactor() {
                return aiSpeedPercent / 100;
            }

            // ============================================================
            // Размеры
            // ============================================================
            function resize() {
                const rect = container.getBoundingClientRect();
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const w = Math.floor(rect.width - 2);
                const h = Math.floor(rect.height - 2);

                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                canvas.width = w * dpr;
                canvas.height = h * dpr;

                const ctx = canvas.getContext('2d');
                ctx.scale(dpr, dpr);

                W = w;
                H = h;

                paddleW = Math.max(12, W * 0.2);
                paddleH = Math.max(8, H * 0.045);
                ballR = Math.max(4, W * 0.025);

                playerPaddle.x = (W - paddleW) / 2;
                playerPaddle.y = H - paddleH - 8;
                enemyPaddle.x = (W - paddleW) / 2;
                enemyPaddle.y = 8;

                ball.x = W / 2;
                ball.y = H / 2;
                if (!running && !gameOver) {
                    resetBall(1);
                }

                if (running || gameOver) draw();
            }

            // ============================================================
            // Сброс мяча
            // ============================================================
            function resetBall(dirY) {
                ball.x = W / 2 + (Math.random() - 0.5) * 40;
                ball.y = H / 2 + (Math.random() - 0.5) * 30;
                const speed = BALL_SPEED_INIT;
                const angle = (Math.random() - 0.5) * 0.8;
                const dx = speed * Math.sin(angle);
                const dy = dirY * speed * Math.cos(angle);
                ball.dx = dx;
                ball.dy = dy;
            }

            // ============================================================
            // Запуск
            // ============================================================
            function startGame(mode) {
                gameMode = mode;
                scorePlayer = 0;
                scoreEnemy = 0;
                gameOver = false;
                running = true;
                menuOverlay.classList.remove('show');
                gameOverOverlay.classList.remove('show');

                // Показываем/скрываем панель управления
                if (mode === 'bot') {
                    controlPanel.classList.remove('hidden');
                } else {
                    controlPanel.classList.add('hidden');
                }

                hintText.textContent = (mode === 'bot') ?
                    '👆 Ведите пальцем по экрану, чтобы двигать ракетку' :
                    '👆 Нижняя половина — игрок, верхняя — друг';

                playerPaddle.x = (W - paddleW) / 2;
                enemyPaddle.x = (W - paddleW) / 2;
                resetBall(1);
                draw();
                if (animId) cancelAnimationFrame(animId);
                loop();
            }

            // ============================================================
            // Цикл
            // ============================================================
            function loop() {
                if (!running) return;
                update();
                draw();
                animId = requestAnimationFrame(loop);
            }

            // ============================================================
            // Обновление
            // ============================================================
            function update() {
                if (gameOver) return;

                ball.x += ball.dx;
                ball.y += ball.dy;

                if (ball.x - ballR < 0) {
                    ball.x = ballR;
                    ball.dx = -ball.dx;
                } else if (ball.x + ballR > W) {
                    ball.x = W - ballR;
                    ball.dx = -ball.dx;
                }

                // Столкновение с ракеткой игрока (нижней)
                if (ball.dy > 0 &&
                    ball.y + ballR >= playerPaddle.y &&
                    ball.y - ballR <= playerPaddle.y + paddleH &&
                    ball.x + ballR >= playerPaddle.x &&
                    ball.x - ballR <= playerPaddle.x + paddleW) {
                    ball.y = playerPaddle.y - ballR;
                    ball.dy = -ball.dy;
                    increaseSpeed();
                    const hitPos = (ball.x - playerPaddle.x) / paddleW;
                    const angle = (hitPos - 0.5) * 1.2;
                    const spd = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                    ball.dx = spd * Math.sin(angle);
                    ball.dy = -spd * Math.cos(angle);
                }

                // Столкновение с ракеткой врага (верхней)
                if (ball.dy < 0 &&
                    ball.y - ballR <= enemyPaddle.y + paddleH &&
                    ball.y + ballR >= enemyPaddle.y &&
                    ball.x + ballR >= enemyPaddle.x &&
                    ball.x - ballR <= enemyPaddle.x + paddleW) {
                    ball.y = enemyPaddle.y + paddleH + ballR;
                    ball.dy = -ball.dy;
                    increaseSpeed();
                    const hitPos = (ball.x - enemyPaddle.x) / paddleW;
                    const angle = (hitPos - 0.5) * 1.2;
                    const spd = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                    ball.dx = spd * Math.sin(angle);
                    ball.dy = spd * Math.cos(angle);
                }

                // Голы
                if (ball.y - ballR < 0) {
                    scoreEnemy++;
                    updateScoreDisplay();
                    resetBall(1);
                } else if (ball.y + ballR > H) {
                    scorePlayer++;
                    updateScoreDisplay();
                    resetBall(-1);
                }

                // AI (бот) — используем динамическую скорость
                if (gameMode === 'bot') {
                    const targetX = ball.x - paddleW / 2;
                    const diff = targetX - enemyPaddle.x;
                    const maxSpeed = W * getAiSpeedFactor();
                    if (Math.abs(diff) > 2) {
                        enemyPaddle.x += Math.sign(diff) * Math.min(Math.abs(diff), maxSpeed);
                    }
                    enemyPaddle.x = Math.max(0, Math.min(W - paddleW, enemyPaddle.x));
                }

                // Управление касаниями
                if (targetX !== null && touchTarget === 'player') {
                    const newX = targetX - paddleW / 2;
                    playerPaddle.x = Math.max(0, Math.min(W - paddleW, newX));
                }
                if (targetX !== null && touchTarget === 'enemy') {
                    const newX = targetX - paddleW / 2;
                    enemyPaddle.x = Math.max(0, Math.min(W - paddleW, newX));
                }

                if (scorePlayer >= WIN_SCORE || scoreEnemy >= WIN_SCORE) {
                    endGame();
                }
            }

            function increaseSpeed() {
                const spd = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                const newSpd = Math.min(spd + BALL_SPEED_INC, MAX_BALL_SPEED);
                const ratio = newSpd / spd;
                ball.dx *= ratio;
                ball.dy *= ratio;
            }

            function endGame() {
                running = false;
                gameOver = true;
                if (animId) {
                    cancelAnimationFrame(animId);
                    animId = null;
                }
                const winner = scorePlayer > scoreEnemy ? 'Игрок' : (scoreEnemy > scorePlayer ? 'Противник' : 'Ничья');
                overlayIcon.textContent = '🏆';
                overlayTitle.textContent = 'Игра окончена';
                overlaySub.textContent = `Победитель: ${winner}`;
                finalScore.textContent = `${scorePlayer} : ${scoreEnemy}`;
                gameOverOverlay.classList.add('show');
                draw();
            }

            function updateScoreDisplay() {}

            // ============================================================
            // Рисование (упрощённое)
            // ============================================================
            function draw() {
                const ctx = canvas.getContext('2d');
                const w = W,
                    h = H;

                ctx.clearRect(0, 0, w, h);

                ctx.fillStyle = '#0b1120';
                ctx.fillRect(0, 0, w, h);

                ctx.setLineDash([6, 10]);
                ctx.strokeStyle = 'rgba(255,255,255,0.07)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, h / 2);
                ctx.lineTo(w, h / 2);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = `bold ${Math.min(w, h) * 0.06}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(`${scorePlayer} : ${scoreEnemy}`, w / 2, 10);

                ctx.fillStyle = '#2dd4bf';
                ctx.fillRect(playerPaddle.x, playerPaddle.y, paddleW, paddleH);
                ctx.fillStyle = '#facc15';
                ctx.fillRect(enemyPaddle.x, enemyPaddle.y, paddleW, paddleH);

                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ballR, 0, Math.PI * 2);
                ctx.fill();
            }

            // ============================================================
            // Обработка касаний
            // ============================================================
            function handleTouchStart(e) {
                e.preventDefault();
                if (!running || gameOver) return;
                const touch = e.touches[0];
                if (!touch) return;
                const rect = canvas.getBoundingClientRect();
                const touchX = touch.clientX - rect.left;
                const touchY = touch.clientY - rect.top;

                let target = 'player';
                if (gameMode === 'friend') {
                    target = (touchY < H / 2) ? 'enemy' : 'player';
                } else {
                    target = 'player';
                }

                touchId = touch.identifier;
                touchTarget = target;
                targetX = touchX;
            }

            function handleTouchMove(e) {
                e.preventDefault();
                if (!running || gameOver) return;
                let activeTouch = null;
                for (let i = 0; i < e.touches.length; i++) {
                    if (e.touches[i].identifier === touchId) {
                        activeTouch = e.touches[i];
                        break;
                    }
                }
                if (!activeTouch) {
                    if (e.touches.length > 0) {
                        activeTouch = e.touches[0];
                        touchId = activeTouch.identifier;
                    } else {
                        return;
                    }
                }
                const rect = canvas.getBoundingClientRect();
                const touchX = activeTouch.clientX - rect.left;
                targetX = Math.max(0, Math.min(W, touchX));
            }

            function handleTouchEnd(e) {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === touchId) {
                        touchId = null;
                        touchTarget = null;
                        targetX = null;
                        break;
                    }
                }
                if (touchId === null && e.touches.length > 0) {
                    const touch = e.touches[0];
                    touchId = touch.identifier;
                    const rect = canvas.getBoundingClientRect();
                    const touchX = touch.clientX - rect.left;
                    const touchY = touch.clientY - rect.top;
                    touchTarget = (gameMode === 'friend') ?
                        (touchY < H / 2 ? 'enemy' : 'player') :
                        'player';
                    targetX = touchX;
                }
            }

            function handleTouchCancel(e) {
                e.preventDefault();
                touchId = null;
                touchTarget = null;
                targetX = null;
            }

            // ============================================================
            // Ползунок скорости бота
            // ============================================================
            aiSpeedSlider.addEventListener('input', function() {
                const val = parseFloat(this.value);
                aiSpeedPercent = val;
                speedDisplay.textContent = val.toFixed(1) + '%';
            });

            aiSpeedSlider.addEventListener('touchstart', (e) => e.stopPropagation());
            aiSpeedSlider.addEventListener('touchmove', (e) => e.stopPropagation());

            // ============================================================
            // Кнопки
            // ============================================================
            document.querySelectorAll('[data-mode]').forEach(btn => {
                const handler = (e) => {
                    e.preventDefault();
                    resize();
                    startGame(btn.dataset.mode);
                };
                btn.addEventListener('click', handler);
                btn.addEventListener('touchstart', handler, { passive: false });
            });

            restartBtn.addEventListener('click', (e) => {
                e.preventDefault();
                resize();
                startGame(gameMode);
            });
            restartBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                resize();
                startGame(gameMode);
            }, { passive: false });

            menuBtn.addEventListener('click', (e) => {
                e.preventDefault();
                running = false;
                gameOver = false;
                if (animId) {
                    cancelAnimationFrame(animId);
                    animId = null;
                }
                gameOverOverlay.classList.remove('show');
                menuOverlay.classList.add('show');
                draw();
            });
            menuBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                running = false;
                gameOver = false;
                if (animId) {
                    cancelAnimationFrame(animId);
                    animId = null;
                }
                gameOverOverlay.classList.remove('show');
                menuOverlay.classList.add('show');
                draw();
            }, { passive: false });

            // ============================================================
            // Ресайз
            // ============================================================
            let resizeTimeout = null;

            function handleResize() {
                if (resizeTimeout) cancelAnimationFrame(resizeTimeout);
                resizeTimeout = requestAnimationFrame(() => {
                    resize();
                    if (running) draw();
                });
            }

            // ============================================================
            // Инициализация
            // ============================================================
            function init() {
                canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
                canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
                canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
                canvas.addEventListener('touchcancel', handleTouchCancel, { passive: false });
                canvas.addEventListener('contextmenu', e => e.preventDefault());

                window.addEventListener('resize', handleResize);
                window.addEventListener('orientationchange', () => {
                    setTimeout(handleResize, 300);
                });

                resize();
                menuOverlay.classList.add('show');
                gameOverOverlay.classList.remove('show');
                draw();
                running = false;
                controlPanel.classList.remove('hidden');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
