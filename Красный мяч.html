<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Красный мяч — жизни и возрождение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0f1a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        .game-wrapper {
            background: #1a2a3a;
            padding: 10px;
            border-radius: 24px;
            box-shadow: 0 10px 0 #0a121f, 0 8px 24px rgba(0,0,0,0.7);
            border: 2px solid #2f4a6a;
        }
        canvas {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 500px;
            height: auto;
            aspect-ratio: 500 / 400;
            background: #1e2f40;
            border-radius: 14px;
            box-shadow: inset 0 0 0 2px #2f4a6a, inset 0 0 0 4px #0d1a2a;
            image-rendering: pixelated;
            touch-action: none;
        }
        .info {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px 2px 12px;
            color: #b0d0f0;
            font-weight: bold;
            font-size: 15px;
            text-shadow: 0 2px 0 #0a121f;
            flex-wrap: wrap;
            gap: 4px;
        }
        .info span {
            background: #0d1a2a;
            padding: 2px 14px;
            border-radius: 30px;
            border: 1px solid #3a5a7a;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding: 0 4px;
            gap: 6px;
        }
        .ctrl-group {
            display: flex;
            gap: 8px;
        }
        .ctrl-btn {
            background: #2f4a6a;
            border: none;
            border-bottom: 4px solid #0d1a2a;
            border-radius: 14px;
            color: #d0e8ff;
            font-size: 22px;
            font-weight: bold;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #0a121f, 0 6px 12px rgba(0,0,0,0.4);
            transition: 0.02s linear;
            touch-action: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-shadow: 0 2px 0 #0a121f;
            padding: 0;
            line-height: 1;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            background: #3a5f85;
        }
        .ctrl-btn.jump {
            background: #c74b4b;
            border-bottom-color: #6f1a1a;
            color: #ffe0e0;
            width: 80px;
            font-size: 18px;
        }
        .ctrl-btn.jump:active {
            background: #e05a5a;
        }
        .ctrl-btn.restart {
            background: #3a5a3a;
            border-bottom-color: #1a3a1a;
            width: 56px;
            font-size: 20px;
        }
        .ctrl-btn.restart:active {
            background: #4a7a4a;
        }
        @media (max-width: 500px) {
            .ctrl-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            .ctrl-btn.jump {
                width: 64px;
                font-size: 14px;
            }
            .info {
                font-size: 13px;
            }
        }
        @media (max-height: 650px) {
            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            .ctrl-btn.jump {
                width: 56px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="info">
        <span>❤️ <span id="livesDisplay">3</span></span>
        <span>🪙 <span id="coinDisplay">0</span></span>
        <span>👾 <span id="killDisplay">0</span></span>
        <span>🏆 <span id="bestDisplay">0</span></span>
    </div>
    <canvas id="gameCanvas" width="500" height="400"></canvas>
    <div class="controls">
        <div class="ctrl-group">
            <button class="ctrl-btn" id="leftBtn">◀</button>
            <button class="ctrl-btn" id="rightBtn">▶</button>
        </div>
        <button class="ctrl-btn jump" id="jumpBtn">⬆ ПРЫЖОК</button>
        <button class="ctrl-btn restart" id="restartBtn">↺</button>
    </div>
</div>
<script>
    (function() {
        // ----- НАСТРОЙКИ -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 500, H = 400;
        canvas.width = W; canvas.height = H;

        const livesSpan = document.getElementById('livesDisplay');
        const coinSpan = document.getElementById('coinDisplay');
        const killSpan = document.getElementById('killDisplay');
        const bestSpan = document.getElementById('bestDisplay');

        const WORLD_W = 2400;
        const WORLD_H = 400;

        const GRAVITY = 0.5;
        const JUMP_FORCE = -9.5;
        const MOVE_SPEED = 4.2;
        const MAX_FALL = 10;

        // ----- СОСТОЯНИЕ -----
        let player = {
            x: 40, y: 300,
            w: 20, h: 20,
            vx: 0, vy: 0,
            onGround: false,
            facing: 1
        };

        let platforms = [];
        let enemies = [];
        let coins = [];
        let finish = null;

        let camera = { x: 0 };
        let coinCount = 0;
        let killCount = 0;
        let lives = 3;
        let bestScore = 0;
        let gameOver = false;
        let winFlag = false;

        // Неуязвимость после возрождения
        let invincible = false;
        let invincibleTimer = 0;

        // Клавиши
        const keys = { left: false, right: false, jump: false };

        // ----- ЗАГРУЗКА ЛУЧШЕГО -----
        try {
            const saved = localStorage.getItem('redBallHorizBest');
            if (saved) bestScore = parseInt(saved, 10) || 0;
        } catch(_) {}
        bestSpan.textContent = bestScore;

        // ----- ПРОЦЕДУРНЫЙ ГЕНЕРАТОР УРОВНЯ -----
        function buildLevel() {
            platforms = [];
            enemies = [];
            coins = [];
            finish = null;
            coinCount = 0;
            killCount = 0;
            lives = 3;
            invincible = false;
            invincibleTimer = 0;
            gameOver = false;
            winFlag = false;
            coinSpan.textContent = '0';
            killSpan.textContent = '0';
            livesSpan.textContent = lives;

            const numSections = 10;
            const sectionWidth = WORLD_W / numSections;
            const minGap = 40;
            const maxGap = 150;
            const minHeight = 280;
            const maxHeight = 360;
            const platMinW = 50;
            const platMaxW = 120;

            let currentX = 0;
            while (currentX < WORLD_W - 50) {
                let segW = 120 + Math.random() * 200;
                if (currentX + segW > WORLD_W) segW = WORLD_W - currentX;
                let yBase = 340 + (Math.random() - 0.5) * 20;
                yBase = Math.min(maxHeight, Math.max(minHeight, yBase));
                platforms.push({ x: currentX, y: yBase, w: segW, h: 40 });

                const numPlats = 1 + Math.floor(Math.random() * 2);
                for (let i = 0; i < numPlats; i++) {
                    let px = currentX + 30 + Math.random() * (segW - 60);
                    let py = yBase - 60 - Math.random() * 100;
                    let pw = platMinW + Math.random() * (platMaxW - platMinW);
                    let ph = 14;
                    if (px + pw > currentX + segW - 10) px = currentX + segW - pw - 10;
                    if (px < currentX + 10) px = currentX + 10;
                    platforms.push({ x: px, y: py, w: pw, h: ph });
                }

                let gap = minGap + Math.random() * (maxGap - minGap);
                currentX += segW + gap;
            }

            // Враги
            const numEnemies = 6 + Math.floor(Math.random() * 5);
            let enemyCandidates = platforms.filter(p => p.w > 50 && p.y < 360);
            for (let i = enemyCandidates.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [enemyCandidates[i], enemyCandidates[j]] = [enemyCandidates[j], enemyCandidates[i]];
            }
            let selected = enemyCandidates.slice(0, numEnemies);
            for (let plat of selected) {
                let ex = plat.x + 10 + Math.random() * (plat.w - 30);
                let ey = plat.y - 22;
                let dir = Math.random() > 0.5 ? 1 : -1;
                enemies.push({
                    x: ex, y: ey,
                    w: 22, h: 22,
                    vx: 1.2 * dir,
                    alive: true,
                    startX: ex,
                    patrolRange: 40 + Math.random() * 60
                });
            }

            // Монеты
            const numCoins = 20 + Math.floor(Math.random() * 15);
            let coinPositions = [];
            for (let p of platforms) {
                if (p.w > 40) {
                    let count = Math.floor(p.w / 50) + 1;
                    for (let i = 0; i < count; i++) {
                        let cx = p.x + 10 + i * (p.w - 20) / count + Math.random() * 10;
                        let cy = p.y - 18 - Math.random() * 8;
                        coinPositions.push({ x: cx, y: cy });
                    }
                }
            }
            for (let i = 0; i < 10; i++) {
                let cx = 50 + Math.random() * (WORLD_W - 100);
                let cy = 100 + Math.random() * 220;
                coinPositions.push({ x: cx, y: cy });
            }
            for (let i = coinPositions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [coinPositions[i], coinPositions[j]] = [coinPositions[j], coinPositions[i]];
            }
            let selectedCoins = coinPositions.slice(0, numCoins);
            for (let cp of selectedCoins) {
                coins.push({ x: cp.x, y: cp.y, w: 12, h: 12, collected: false });
                coinCount++;
            }

            // Финиш
            let lastPlat = platforms.reduce((a, b) => a.x > b.x ? a : b);
            finish = { x: lastPlat.x + lastPlat.w - 50, y: lastPlat.y - 40, w: 30, h: 40 };

            // Сброс игрока
            player.x = 40;
            player.y = 300;
            player.vx = 0;
            player.vy = 0;
            player.onGround = false;
            camera.x = 0;
        }

        // ----- ФУНКЦИЯ ВОЗРОЖДЕНИЯ -----
        function respawn() {
            lives--;
            livesSpan.textContent = lives;
            if (lives <= 0) {
                gameOver = true;
                return;
            }
            // Возвращаем на старт
            player.x = 40;
            player.y = 300;
            player.vx = 0;
            player.vy = 0;
            player.onGround = false;
            // Включаем неуязвимость
            invincible = true;
            invincibleTimer = 60; // ~1 секунда при 60fps
        }

        // ----- ОБНОВЛЕНИЕ ИГРЫ -----
        function update() {
            if (gameOver || winFlag) return;

            // ---- Управление ----
            let moveX = 0;
            if (keys.left) moveX = -1;
            if (keys.right) moveX = 1;
            player.vx = moveX * MOVE_SPEED;
            if (moveX !== 0) player.facing = moveX;

            if (keys.jump && player.onGround) {
                player.vy = JUMP_FORCE;
                player.onGround = false;
                keys.jump = false;
            }

            player.vy += GRAVITY;
            if (player.vy > MAX_FALL) player.vy = MAX_FALL;

            player.x += player.vx;
            if (player.x < 0) player.x = 0;
            if (player.x + player.w > WORLD_W) player.x = WORLD_W - player.w;

            player.y += player.vy;

            // ---- Коллизии с платформами ----
            player.onGround = false;
            for (let plat of platforms) {
                if (player.x < plat.x + plat.w &&
                    player.x + player.w > plat.x &&
                    player.y < plat.y + plat.h &&
                    player.y + player.h > plat.y) {

                    const overlapX = Math.min(player.x + player.w - plat.x, plat.x + plat.w - player.x);
                    const overlapY = Math.min(player.y + player.h - plat.y, plat.y + plat.h - player.y);

                    if (overlapX < overlapY) {
                        if (player.vx > 0) player.x = plat.x - player.w;
                        else if (player.vx < 0) player.x = plat.x + plat.w;
                        player.vx = 0;
                    } else {
                        if (player.vy > 0) {
                            player.y = plat.y - player.h;
                            player.vy = 0;
                            player.onGround = true;
                        } else if (player.vy < 0) {
                            player.y = plat.y + plat.h;
                            player.vy = 0;
                        }
                    }
                }
            }

            // ---- Сбор монет ----
            for (let coin of coins) {
                if (coin.collected) continue;
                if (player.x < coin.x + coin.w &&
                    player.x + player.w > coin.x &&
                    player.y < coin.y + coin.h &&
                    player.y + player.h > coin.y) {
                    coin.collected = true;
                    coinCount--;
                    const cur = parseInt(coinSpan.textContent, 10) || 0;
                    coinSpan.textContent = cur + 1;
                }
            }

            // ---- Враги ----
            for (let enemy of enemies) {
                if (!enemy.alive) continue;
                enemy.x += enemy.vx;
                if (enemy.x < enemy.startX - enemy.patrolRange || enemy.x > enemy.startX + enemy.patrolRange) {
                    enemy.vx *= -1;
                }
                let onPlat = false;
                for (let plat of platforms) {
                    if (enemy.x + enemy.w > plat.x && enemy.x < plat.x + plat.w &&
                        enemy.y + enemy.h >= plat.y && enemy.y + enemy.h <= plat.y + 10) {
                        onPlat = true;
                        break;
                    }
                }
                if (!onPlat) {
                    enemy.y += 2;
                    if (enemy.y > WORLD_H + 50) enemy.alive = false;
                }

                // Столкновение с игроком (только если не неуязвим)
                if (!invincible) {
                    if (player.x < enemy.x + enemy.w &&
                        player.x + player.w > enemy.x &&
                        player.y < enemy.y + enemy.h &&
                        player.y + player.h > enemy.y) {
                        if (player.vy > 0 && player.y + player.h - enemy.y < 20) {
                            enemy.alive = false;
                            player.vy = -6;
                            killCount++;
                            killSpan.textContent = killCount;
                        } else {
                            // Потеря жизни
                            respawn();
                            return; // выходим, чтобы не было повторных коллизий в этом кадре
                        }
                    }
                }
            }

            // ---- Финиш ----
            if (finish) {
                if (player.x < finish.x + finish.w &&
                    player.x + player.w > finish.x &&
                    player.y < finish.y + finish.h &&
                    player.y + player.h > finish.y) {
                    winFlag = true;
                    const currentScore = parseInt(coinSpan.textContent, 10) || 0;
                    if (currentScore > bestScore) {
                        bestScore = currentScore;
                        bestSpan.textContent = bestScore;
                        try {
                            localStorage.setItem('redBallHorizBest', String(bestScore));
                        } catch(_) {}
                    }
                }
            }

            // ---- Падение в пропасть ----
            if (player.y > WORLD_H + 30) {
                respawn();
                return;
            }

            // ---- Таймер неуязвимости ----
            if (invincible) {
                invincibleTimer--;
                if (invincibleTimer <= 0) {
                    invincible = false;
                }
            }

            // ---- Камера ----
            let targetCamX = player.x - W / 2;
            targetCamX = Math.max(0, Math.min(targetCamX, WORLD_W - W));
            camera.x += (targetCamX - camera.x) * 0.1;
        }

        // ----- ОТРИСОВКА -----
        function draw() {
            ctx.clearRect(0, 0, W, H);
            // Фон
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#1f3a5a');
            grad.addColorStop(1, '#2a506a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Звёзды
            ctx.fillStyle = '#aac0e0';
            for (let i = 0; i < 40; i++) {
                let sx = (i * 37 + 13) % WORLD_W;
                let sy = (i * 29 + 7) % (H * 0.7);
                let cx = sx - camera.x * 0.3;
                if (cx > -10 && cx < W + 10) {
                    ctx.fillRect(cx, sy, 2, 2);
                }
            }

            ctx.save();
            ctx.translate(-camera.x, 0);

            // Платформы
            for (let plat of platforms) {
                ctx.fillStyle = '#4a6a8a';
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.fillStyle = '#3a5a7a';
                ctx.fillRect(plat.x + 2, plat.y - 2, plat.w - 4, 4);
                ctx.fillStyle = '#2a4a6a';
                ctx.fillRect(plat.x, plat.y + plat.h - 3, plat.w, 3);
                ctx.fillStyle = '#5a7a9a';
                for (let i = 0; i < plat.w; i += 10) {
                    ctx.fillRect(plat.x + i, plat.y + 4, 2, 2);
                }
            }

            // Монеты
            for (let coin of coins) {
                if (coin.collected) continue;
                ctx.shadowColor = '#f0d050';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#f5c542';
                ctx.fillRect(coin.x, coin.y, coin.w, coin.h);
                ctx.fillStyle = '#fae170';
                ctx.fillRect(coin.x + 2, coin.y + 2, 4, 4);
                ctx.fillRect(coin.x + 6, coin.y + 6, 4, 4);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#b08820';
                ctx.fillRect(coin.x, coin.y + 4, 2, 4);
                ctx.fillRect(coin.x + 10, coin.y + 4, 2, 4);
            }

            // Враги
            for (let enemy of enemies) {
                if (!enemy.alive) continue;
                ctx.fillStyle = '#6f4f1f';
                ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
                ctx.fillStyle = '#8f6f3f';
                ctx.fillRect(enemy.x + 2, enemy.y + 2, enemy.w - 4, enemy.h - 4);
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(enemy.x + 4, enemy.y + 5, 5, 5);
                ctx.fillRect(enemy.x + 13, enemy.y + 5, 5, 5);
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(enemy.x + 6, enemy.y + 7, 2, 3);
                ctx.fillRect(enemy.x + 15, enemy.y + 7, 2, 3);
            }

            // Финиш
            if (finish) {
                ctx.fillStyle = '#aaa';
                ctx.fillRect(finish.x + 14, finish.y, 4, finish.h);
                ctx.fillStyle = '#e03030';
                ctx.fillRect(finish.x + 18, finish.y + 4, 16, 10);
                ctx.fillStyle = '#f0a0a0';
                ctx.fillRect(finish.x + 18, finish.y + 4, 8, 10);
                ctx.fillStyle = '#ffd700';
                ctx.font = '12px sans-serif';
                ctx.fillText('★', finish.x + 22, finish.y + 13);
            }

            // Игрок (рисуем только если не в состоянии неуязвимости с миганием)
            let drawPlayer = true;
            if (invincible && Math.floor(invincibleTimer / 4) % 2 === 0) {
                drawPlayer = false; // мигание
            }
            if (drawPlayer) {
                const px = player.x, py = player.y;
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.ellipse(px + player.w/2, py + player.h/2, player.w/2, player.h/2, 0, 0, Math.PI*2);
                ctx.fillStyle = '#e03030';
                ctx.fill();
                const gradBall = ctx.createRadialGradient(px+6, py+4, 3, px+10, py+10, 14);
                gradBall.addColorStop(0, '#ff6a6a');
                gradBall.addColorStop(1, '#b01010');
                ctx.beginPath();
                ctx.ellipse(px + player.w/2, py + player.h/2, player.w/2-1, player.h/2-1, 0, 0, Math.PI*2);
                ctx.fillStyle = gradBall;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#f0f0f0';
                let eyeOff = player.facing === 1 ? 2 : -2;
                ctx.fillRect(px + 4 + eyeOff, py + 4, 5, 6);
                ctx.fillRect(px + 11 + eyeOff, py + 4, 5, 6);
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(px + 6 + eyeOff, py + 6, 2, 4);
                ctx.fillRect(px + 13 + eyeOff, py + 6, 2, 4);
                ctx.fillStyle = 'white';
                ctx.fillRect(px + 5 + eyeOff, py + 5, 1, 2);
                ctx.fillRect(px + 12 + eyeOff, py + 5, 1, 2);
            }

            ctx.restore();

            // UI
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, H/2 - 40, W, 60);
                ctx.fillStyle = '#ffb0b0';
                ctx.font = 'bold 20px "Courier New"';
                ctx.fillText('💀 ИГРА ОКОНЧЕНА', W/2, H/2 - 8);
                ctx.font = '14px "Courier New"';
                ctx.fillStyle = '#d0d0ff';
                ctx.fillText('нажмите ↺', W/2, H/2 + 28);
            }
            if (winFlag) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, H/2 - 40, W, 60);
                ctx.fillStyle = '#f5e56b';
                ctx.font = 'bold 22px "Courier New"';
                ctx.fillText('🌟 ПОБЕДА!', W/2, H/2 - 8);
                ctx.font = '14px "Courier New"';
                ctx.fillStyle = '#c0d0ff';
                ctx.fillText('лучший счёт обновлён', W/2, H/2 + 28);
            }
            ctx.textAlign = 'right';
            ctx.textBaseline = 'top';
            ctx.font = 'bold 14px "Courier New"';
            ctx.fillStyle = '#ffdd77';
            let totalCoins = parseInt(coinSpan.textContent, 10) || 0;
            ctx.fillText('🪙 ' + totalCoins, W - 14, 8);
        }

        // ----- ЦИКЛ -----
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // ----- УПРАВЛЕНИЕ -----
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') {
                keys.left = true; e.preventDefault();
            } else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') {
                keys.right = true; e.preventDefault();
            } else if (key === ' ' || key === 'Space' || key === 'ArrowUp' || key === 'Up' || key === 'w' || key === 'W') {
                keys.jump = true; e.preventDefault();
            } else if (key === 'r' || key === 'R') {
                restartGame(); e.preventDefault();
            }
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key;
            if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') {
                keys.left = false; e.preventDefault();
            } else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') {
                keys.right = false; e.preventDefault();
            } else if (key === ' ' || key === 'Space' || key === 'ArrowUp' || key === 'Up' || key === 'w' || key === 'W') {
                keys.jump = false; e.preventDefault();
            }
        });

        function setupBtn(id, onStart, onEnd) {
            const btn = document.getElementById(id);
            if (!btn) return;
            const start = (e) => { e.preventDefault(); if (onStart) onStart(); };
            const end = (e) => { e.preventDefault(); if (onEnd) onEnd(); };
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
            btn.addEventListener('mouseleave', end);
            btn.addEventListener('touchstart', start, { passive: false });
            btn.addEventListener('touchend', end, { passive: false });
            btn.addEventListener('touchcancel', end, { passive: false });
        }

        setupBtn('leftBtn',
            () => { keys.left = true; },
            () => { keys.left = false; }
        );
        setupBtn('rightBtn',
            () => { keys.right = true; },
            () => { keys.right = false; }
        );
        setupBtn('jumpBtn',
            () => { if (!gameOver && !winFlag) keys.jump = true; },
            () => { keys.jump = false; }
        );
        setupBtn('restartBtn', restartGame, null);

        // ----- РЕСТАРТ -----
        function restartGame() {
            const cur = parseInt(coinSpan.textContent, 10) || 0;
            if (cur > bestScore) {
                bestScore = cur;
                bestSpan.textContent = bestScore;
                try { localStorage.setItem('redBallHorizBest', String(bestScore)); } catch(_) {}
            }
            buildLevel();
            keys.left = false; keys.right = false; keys.jump = false;
            gameOver = false; winFlag = false;
            invincible = false;
            invincibleTimer = 0;
        }

        // ----- ЗАПУСК -----
        buildLevel();
        loop();

        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('.game-wrapper')) e.preventDefault();
        }, { passive: false });

    })();
</script>
</body>
</html>
