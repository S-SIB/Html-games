<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏁 F1 RACING — 5 LANES</title>
    <style>
        * {
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            height: 100dvh;
            margin: 0;
            padding: 0;
            background: #0a0c12;
            font-family: 'Courier New', 'Fira Code', monospace;
            touch-action: manipulation;
            overflow: hidden;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px;
        }
        .game-container {
            background: #000000;
            border-radius: 1.5rem;
            padding: 0.6rem 0.8rem;
            border: 2px solid #3eff9e;
            box-shadow: 0 0 20px rgba(62,255,158,0.3);
            max-width: 100%;
            width: 98vw;
            height: 98vh;
            height: 98dvh;
            max-height: 98vh;
            max-height: 98dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .title {
            text-align: center;
            font-size: clamp(1rem, 3vmin, 1.8rem);
            letter-spacing: 2px;
            color: #f0ff70;
            flex-shrink: 0;
            margin-bottom: 2px;
        }
        pre {
            margin: 0;
            font-family: 'Courier New', monospace;
            /* Шрифт теперь чуть меньше в максимуме, чтобы вместить 5 рядов */
            font-size: clamp(9px, 2.2vmin, 18px);
            line-height: 1.3;
            color: #b3ffcf;
            background: #0a0f0c;
            padding: 4px 6px;
            border-radius: 10px;
            white-space: pre;
            letter-spacing: 0px;
            text-shadow: 0 0 2px #1eff6e;
            overflow: hidden;
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
        }
        .info-panel {
            background: #101c16;
            margin-top: 4px;
            padding: 3px 6px;
            border-radius: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            font-weight: bold;
            color: #bbffaa;
            border: 1px solid #3eff6a;
            font-size: clamp(0.6rem, 1.4vmin, 1rem);
            flex-shrink: 0;
        }
        .stat {
            background: #051f18;
            padding: 1px 8px;
            border-radius: 16px;
            margin: 1px 0;
        }
        .controls-row {
            display: flex;
            justify-content: center;
            gap: clamp(8px, 2vw, 20px);
            margin-top: 4px;
            flex-shrink: 0;
        }
        .ctrl-btn {
            background: #1f3d31;
            border: 2px solid #3eff9e;
            border-radius: 60px;
            color: #d9ffc7;
            font-size: clamp(1.6rem, 4.5vmin, 3rem);
            font-family: monospace;
            font-weight: bold;
            width: clamp(54px, 11vmin, 88px);
            height: clamp(54px, 11vmin, 88px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #0e241d, inset 0 -2px 0 #1e3a2c;
            transition: 0.05s linear;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0e241d;
        }
        .ctrl-btn.wide {
            width: clamp(64px, 13vmin, 104px);
        }
        .reset-btn {
            background: #2a483a;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: clamp(0.7rem, 1.6vmin, 1.1rem);
            padding: 3px 16px;
            border-radius: 30px;
            color: #d9ffc7;
            cursor: pointer;
            box-shadow: inset 0 -2px 0 #1e3a2c;
            transition: 0.05s linear;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .reset-btn:active {
            transform: translateY(2px);
        }
        .controls-hint {
            text-align: center;
            margin: 2px 0 0 0;
            font-size: clamp(0.5rem, 1.2vmin, 0.8rem);
            background: #0e241d;
            padding: 1px 10px;
            border-radius: 30px;
            color: #9ed98e;
            flex-shrink: 0;
        }
        .btn-row {
            display: flex;
            justify-content: center;
            gap: clamp(8px, 2vw, 20px);
            margin-top: 3px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        @media (orientation: landscape) and (max-height: 500px) {
            .game-container { padding: 0.3rem 0.6rem; }
            .title { font-size: clamp(0.7rem, 2vmin, 1.2rem); }
            pre { font-size: clamp(9px, 2vmin, 14px); }
            .ctrl-btn { width: clamp(40px, 8vmin, 60px); height: clamp(40px, 8vmin, 60px); font-size: clamp(1.2rem, 3.2vmin, 2rem); }
            .ctrl-btn.wide { width: clamp(48px, 10vmin, 74px); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">═══ F1  5‑LANE ═══</div>
        <pre id="asciiScreen">Загрузка...</pre>
        <div class="info-panel">
            <div class="stat">🏁 <span id="scoreDisplay">0</span></div>
            <div class="stat">⏱️ <span id="timerDisplay">0</span>с</div>
            <div class="stat">💀 <span id="deathsDisplay">0</span></div>
            <div class="stat">⚡ <span id="speedDisplay">1.0</span>x</div>
            <div class="stat">🏆 <span id="bestDisplay">0</span></div>
        </div>

        <div class="controls-row">
            <button class="ctrl-btn" id="btnLeft">◀</button>
            <button class="ctrl-btn wide" id="btnUp">▲</button>
            <button class="ctrl-btn" id="btnRight">▶</button>
        </div>

        <div class="btn-row">
            <button class="reset-btn" id="resetButton">🔄 НОВАЯ</button>
        </div>
        <div class="controls-hint">← → движение &nbsp;|&nbsp; ▲ ускорение</div>
    </div>

    <script>
        // ------------------------------------------------------------
        // КОНФИГУРАЦИЯ
        // ------------------------------------------------------------
        const NUM_LANES = 5;
        const EMPTY = "       ";
        const MARK  = "   |   ";

        const PLAYER_BLOCKS = [
            "       ",
            "  /#\\  ",
            " 0)!(0 ",
            "  (8)  ",
            " 0)!(0 ",
            "   |   "
        ];

        const ENEMY_BLOCKS = [
            "       ",
            "  /#\\  ",
            " [POL] ",
            "  ( )  ",
            " 0)=(0 ",
            "   |   "
        ];

        const EXPLOSION_FRAMES = [
            [
                "       ",
                "   .   ",
                "  .!.  ",
                "   .   ",
                "       ",
                "   |   "
            ],
            [
                "       ",
                "  .*.  ",
                " *@!@* ",
                "  .*.  ",
                "       ",
                "   |   "
            ],
            [
                "       ",
                " \\|@|/ ",
                " *!@!* ",
                " /|@|\\ ",
                "       ",
                "   |   "
            ],
            [
                "       ",
                " /***\\ ",
                "***!***",
                " \\***/ ",
                "       ",
                "   |   "
            ],
            [
                "       ",
                "  ~ ~  ",
                " ~   ~ ",
                "  ~ ~  ",
                "       ",
                "   |   "
            ],
            [
                "       ",
                "  ...  ",
                " .   . ",
                "  ...  ",
                "       ",
                "   |   "
            ]
        ];

        const ROAD_PATTERN = [0, 1, 0, 1, 0, 1];

        // ------------------------------------------------------------
        // ФУНКЦИИ ПОСТРОЕНИЯ
        // ------------------------------------------------------------
        function buildSprite(blocks, pos) {
            const lines = [];
            for (let i = 0; i < 6; i++) {
                const parts = [];
                for (let lane = 0; lane < NUM_LANES; lane++) {
                    if (lane === pos) {
                        parts.push(blocks[i]);
                    } else {
                        parts.push(ROAD_PATTERN[i] === 0 ? EMPTY : MARK);
                    }
                }
                lines.push("|" + parts.join("||") + "|");
            }
            return lines;
        }

        function buildCombinedSprite(playerBlocks, enemyBlocks, playerPos, enemyPos) {
            const lines = [];
            for (let i = 0; i < 6; i++) {
                const parts = [];
                for (let lane = 0; lane < NUM_LANES; lane++) {
                    let block;
                    if (lane === playerPos) {
                        block = playerBlocks[i];
                    } else if (lane === enemyPos && enemyPos !== playerPos) {
                        block = enemyBlocks[i];
                    } else {
                        block = ROAD_PATTERN[i] === 0 ? EMPTY : MARK;
                    }
                    parts.push(block);
                }
                lines.push("|" + parts.join("||") + "|");
            }
            return lines;
        }

        function buildExplosionSprite(frameIdx, pos) {
            const frame = EXPLOSION_FRAMES[frameIdx] || EXPLOSION_FRAMES[0];
            return buildSprite(frame, pos);
        }

        function buildRoadClear() {
            const lines = [];
            for (let i = 0; i < 6; i++) {
                const parts = [];
                for (let lane = 0; lane < NUM_LANES; lane++) {
                    parts.push(ROAD_PATTERN[i] === 0 ? EMPTY : MARK);
                }
                lines.push("|" + parts.join("||") + "|");
            }
            return lines;
        }

        const ROAD_CLEAR_SPRITE = buildRoadClear();

        const playerSprites = {};
        const enemySprites = {};
        for (let p = 0; p < NUM_LANES; p++) {
            playerSprites[p] = buildSprite(PLAYER_BLOCKS, p);
            enemySprites[p] = buildSprite(ENEMY_BLOCKS, p);
        }

        // ------------------------------------------------------------
        // ИГРОВАЯ ЛОГИКА
        // ------------------------------------------------------------
        let playerPos = 2;
        let road = [0, 0, 0, 0, 0, 0, 0, 0];
        let carsInRow = 0;
        let score = 0;
        let highScore = 0;
        let deaths = 0;
        let gameActive = true;
        let explosionFrame = -1;
        let explosionPos = 2;
        let currentDelay = 450;
        const minDelay = 120;
        let lastExplosionUpdate = 0;
        let timerSeconds = 0;

        const screenPre = document.getElementById('asciiScreen');
        const scoreSpan = document.getElementById('scoreDisplay');
        const deathsSpan = document.getElementById('deathsDisplay');
        const speedSpan = document.getElementById('speedDisplay');
        const bestSpan = document.getElementById('bestDisplay');
        const timerSpan = document.getElementById('timerDisplay');

        function updateUI() {
            scoreSpan.textContent = score;
            deathsSpan.textContent = deaths;
            bestSpan.textContent = highScore;
            const speedFactor = (450 / Math.max(minDelay, currentDelay)).toFixed(1);
            speedSpan.textContent = speedFactor;
            if (score > highScore) {
                highScore = score;
                bestSpan.textContent = highScore;
            }
            timerSpan.textContent = timerSeconds;
        }

        setInterval(() => {
            if (gameActive && explosionFrame === -1) {
                timerSeconds++;
                timerSpan.textContent = timerSeconds;
            }
        }, 1000);

        function spawnCar() {
            if (carsInRow >= 2) {
                road[0] = 0;
                carsInRow = 0;
            } else if (Math.random() < 0.55) {
                const possible = [0, 1, 2, 3, 4];
                let chosen;
                if (Math.random() < 0.3) {
                    chosen = playerPos;
                } else {
                    const withoutPlayer = possible.filter(p => p !== playerPos);
                    if (withoutPlayer.length) {
                        chosen = withoutPlayer[Math.floor(Math.random() * withoutPlayer.length)];
                    } else {
                        chosen = possible[Math.floor(Math.random() * possible.length)];
                    }
                }
                road[0] = chosen + 1;
                carsInRow++;
            } else {
                road[0] = 0;
                carsInRow = 0;
            }
        }

        function updateRoad() {
            for (let i = 7; i > 0; i--) road[i] = road[i-1];
            spawnCar();
        }

        function checkCollision() {
            const lastCar = road[7];
            if (lastCar !== 0) {
                const enemyPos = lastCar - 1;
                if (enemyPos === playerPos) return true;
            }
            return false;
        }

        function startExplosion() {
            if (explosionFrame !== -1) return;
            explosionFrame = 0;
            explosionPos = playerPos;
            gameActive = false;
            lastExplosionUpdate = performance.now();
            if (navigator.vibrate) {
                navigator.vibrate(200);
            }
        }

        function updateExplosion(now) {
            if (explosionFrame === -1) return false;
            if (now - lastExplosionUpdate >= 140) {
                explosionFrame++;
                lastExplosionUpdate = now;
                if (explosionFrame >= 6) {
                    explosionFrame = -1;
                    if (score > highScore) highScore = score;
                    deaths++;
                    score = 0;
                    timerSeconds = 0;
                    currentDelay = 450;
                    road = [0, 0, 0, 0, 0, 0, 0, 0];
                    carsInRow = 0;
                    gameActive = true;
                    updateUI();
                    return true;
                }
            }
            return false;
        }

        function moveLeft() {
            if (!gameActive || explosionFrame !== -1) return;
            if (playerPos > 0) {
                playerPos--;
                updateUI();
                if (checkCollision()) startExplosion();
                updateSpeedByScore();
            }
        }

        function moveRight() {
            if (!gameActive || explosionFrame !== -1) return;
            if (playerPos < NUM_LANES - 1) {
                playerPos++;
                updateUI();
                if (checkCollision()) startExplosion();
                updateSpeedByScore();
            }
        }

        function forceSpeedUp() {
            if (!gameActive || explosionFrame !== -1) return;
            updateRoad();
            lastTickTime = performance.now();
            score++;
            updateUI();
            if (checkCollision()) startExplosion();
            updateSpeedByScore();
        }

        function updateSpeedByScore() {
            let newDelay = 450 - Math.floor(score / 20) * 20;
            if (newDelay < minDelay) newDelay = minDelay;
            currentDelay = newDelay;
        }

        // ------------------------------------------------------------
        // РЕНДЕРИНГ (4 ДОРОЖНЫХ РЯДА + РЯД ИГРОКА = 5 РЯДОВ)
        // ------------------------------------------------------------
        function renderFrame() {
            const output = [];
            // Показываем дорожные ряды с индексами 3,4,5,6 – четыре ряда
            for (let i = 3; i <= 6; i++) {
                const car = road[i];
                if (car === 0) {
                    output.push(...ROAD_CLEAR_SPRITE);
                } else {
                    const enemyPos = car - 1;
                    output.push(...enemySprites[enemyPos]);
                }
            }

            // Ряд игрока (индекс 7)
            const lastCar = road[7];
            if (explosionFrame !== -1) {
                const expLines = buildExplosionSprite(explosionFrame, explosionPos);
                output.push(...expLines);
            } else if (lastCar === 0) {
                output.push(...playerSprites[playerPos]);
            } else {
                const enemyPos = lastCar - 1;
                if (enemyPos === playerPos) {
                    output.push(...playerSprites[playerPos]);
                } else {
                    const combined = buildCombinedSprite(PLAYER_BLOCKS, ENEMY_BLOCKS, playerPos, enemyPos);
                    output.push(...combined);
                }
            }

            screenPre.textContent = output.join('\n');
        }

        // ------------------------------------------------------------
        // ИГРОВОЙ ЦИКЛ
        // ------------------------------------------------------------
        let lastTickTime = performance.now();

        function gameLoop(now) {
            requestAnimationFrame(gameLoop);
            if (gameActive && explosionFrame === -1) {
                if (now - lastTickTime >= currentDelay) {
                    updateRoad();
                    score++;
                    updateUI();
                    if (checkCollision()) startExplosion();
                    updateSpeedByScore();
                    lastTickTime = now;
                }
            } else if (explosionFrame !== -1) {
                updateExplosion(now);
            }
            renderFrame();
        }

        function fullReset() {
            gameActive = true;
            explosionFrame = -1;
            score = 0;
            deaths = 0;
            timerSeconds = 0;
            currentDelay = 450;
            playerPos = Math.floor(NUM_LANES / 2);
            road = [0, 0, 0, 0, 0, 0, 0, 0];
            carsInRow = 0;
            updateUI();
            lastTickTime = performance.now();
            renderFrame();
        }

        // ------------------------------------------------------------
        // УПРАВЛЕНИЕ
        // ------------------------------------------------------------
        function setupTouchButton(element, action) {
            if (!element) return;
            const handler = (e) => {
                e.preventDefault();
                e.stopPropagation();
                action();
            };
            element.addEventListener('touchstart', handler, { passive: false });
            element.addEventListener('mousedown', handler);
            element.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnUp = document.getElementById('btnUp');
        const resetBtn = document.getElementById('resetButton');

        setupTouchButton(btnLeft, moveLeft);
        setupTouchButton(btnRight, moveRight);
        setupTouchButton(btnUp, forceSpeedUp);
        
        resetBtn.addEventListener('click', fullReset);
        resetBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            fullReset();
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { e.preventDefault(); moveLeft(); }
            else if (e.key === 'ArrowRight') { e.preventDefault(); moveRight(); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); forceSpeedUp(); }
            else if (e.key === 'r' || e.key === 'R') { e.preventDefault(); fullReset(); }
        });

        // ------------------------------------------------------------
        // СТАРТ
        // ------------------------------------------------------------
        fullReset();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
