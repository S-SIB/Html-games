<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drill Miner — мобильная версия</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a1f1e;
            font-family: 'Segoe UI', 'Courier New', monospace;
            touch-action: none;
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            max-height: 100vh;
            max-height: 100dvh;
            padding: 6px 8px 6px 8px;
            background: linear-gradient(145deg, #0a1f1e 0%, #071513 100%);
            gap: 4px;
            overflow: hidden;
        }

        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 4px 8px;
            background: #1f2a24cc;
            border-radius: 14px;
            padding: 4px 10px;
            border: 1px solid #7e6b4e;
            flex-shrink: 0;
            min-height: 32px;
            backdrop-filter: blur(4px);
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            font-weight: 700;
            color: #f7ecc7;
            text-shadow: 0 1px 2px #000000aa;
            font-family: monospace;
            white-space: nowrap;
        }
        .stat .icon {
            font-size: 13px;
        }
        .stat .val {
            min-width: 18px;
            text-align: center;
        }
        .battery-bar {
            background: #3a2a24;
            border-radius: 12px;
            height: 10px;
            width: 50px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px #00000055;
            flex-shrink: 0;
        }
        .battery-fill {
            background: linear-gradient(90deg, #ffc857, #f0b27a);
            width: 100%;
            height: 100%;
            border-radius: 12px;
            transition: width 0.15s ease;
        }
        .battery-fill.low {
            background: #e35f21;
        }
        .battery-fill.critical {
            background: #c73d23;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
            }
        }
        .game-status {
            font-size: 10px;
            font-weight: 700;
            color: #b9f6ca;
            padding: 1px 8px;
            background: #00000077;
            border-radius: 20px;
            white-space: nowrap;
        }
        .game-status.dead {
            color: #f8a35e;
        }

        .canvas-wrapper {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }
        .canvas-wrapper canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 0 2px #5e4b3c, 0 8px 20px rgba(0, 0, 0, 0.5);
            background: #1e2a2a;
            image-rendering: pixelated;
            touch-action: none;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
        }

        .controls {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
            padding: 4px 0;
            flex-wrap: wrap;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            width: 140px;
            height: 140px;
            flex-shrink: 0;
        }
        .dpad button {
            border: none;
            border-radius: 14px;
            background: #3d3a3a;
            color: #f7ecc7;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 3px 0 #1f1a1a, inset 0 1px 0 #6a5f5f;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.05s;
            min-width: 0;
            min-height: 0;
            padding: 0;
        }
        .dpad button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f1a1a;
            background: #5a4f4f;
        }
        .dpad .empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
            pointer-events: none;
        }
        .dpad .empty:active {
            transform: none;
            box-shadow: none;
            background: transparent;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
        }
        .actions .row {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        .actions button {
            border: none;
            border-radius: 12px;
            font-family: monospace;
            font-weight: 700;
            font-size: 12px;
            padding: 6px 10px;
            color: #fdf6e3;
            cursor: pointer;
            box-shadow: 0 3px 0 #2a1f1a;
            touch-action: manipulation;
            transition: all 0.05s;
            white-space: nowrap;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .actions button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2a1f1a;
        }
        .btn-dynamite {
            background: #b34e3a;
            box-shadow: 0 3px 0 #6e2c1a;
        }
        .btn-upgrade {
            background: #4a6a3a;
            box-shadow: 0 3px 0 #2a3a1a;
        }
        .btn-restart {
            background: #6f5843;
            box-shadow: 0 3px 0 #3e2a1f;
        }
        .btn-dynamite:active {
            background: #9a3d2e;
        }
        .btn-upgrade:active {
            background: #3a552a;
        }
        .btn-restart:active {
            background: #5a4433;
        }

        .controls-tip {
            font-size: 9px;
            color: #9a8a7a;
            background: #00000055;
            padding: 2px 10px;
            border-radius: 20px;
            flex-shrink: 0;
            text-align: center;
            white-space: nowrap;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-content {
            background: #2c2e2b;
            border-radius: 2rem;
            padding: 1.2rem;
            max-width: 400px;
            width: 100%;
            color: #f7ecc7;
            font-family: monospace;
            border: 2px solid #c9ae86;
            box-shadow: 0 10px 25px black;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            margin-top: 0;
            text-align: center;
            color: #ffd966;
            font-size: 1.2rem;
        }
        .bank-display {
            font-size: 1.2rem;
            text-align: center;
            background: #00000088;
            border-radius: 2rem;
            padding: 4px 12px;
            margin-bottom: 12px;
        }
        .upgrade-item {
            background: #1f2a24;
            margin: 8px 0;
            padding: 8px 12px;
            border-radius: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .upgrade-item .info {
            font-size: 12px;
            flex: 1;
            min-width: 120px;
        }
        .upgrade-item .info strong {
            font-size: 13px;
        }
        .upgrade-item button {
            border: none;
            border-radius: 20px;
            font-family: monospace;
            font-weight: 700;
            font-size: 11px;
            padding: 5px 14px;
            color: #fdf6e3;
            cursor: pointer;
            box-shadow: 0 3px 0 #2a1f1a;
            transition: all 0.05s;
            background: #4a6a3a;
            white-space: nowrap;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        .upgrade-item button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2a1f1a;
        }
        .upgrade-item button:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 3px 0 #2a1f1a;
            cursor: default;
        }
        .close-modal {
            background: #6f5843;
            margin-top: 12px;
            width: 100%;
            border: none;
            border-radius: 2rem;
            font-family: monospace;
            font-weight: 700;
            font-size: 1rem;
            padding: 8px;
            color: #fdf6e3;
            cursor: pointer;
            box-shadow: 0 3px 0 #3e2a1f;
            transition: all 0.05s;
            touch-action: manipulation;
        }
        .close-modal:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #3e2a1f;
        }
        .modal .upgrade-cost {
            font-weight: 700;
            color: #ffb347;
            font-size: 11px;
        }

        @media (max-width: 420px) {
            .dpad {
                width: 110px;
                height: 110px;
                gap: 3px;
            }
            .dpad button {
                font-size: 18px;
                border-radius: 10px;
            }
            .actions button {
                font-size: 10px;
                padding: 4px 8px;
                min-height: 30px;
            }
            .stat {
                font-size: 9px;
            }
            .battery-bar {
                width: 36px;
                height: 8px;
            }
            .stats-panel {
                padding: 3px 6px;
                gap: 2px 5px;
                min-height: 26px;
            }
            .game-status {
                font-size: 8px;
                padding: 1px 6px;
            }
            .controls-tip {
                font-size: 7px;
                padding: 1px 8px;
            }
            .modal-content {
                padding: 0.8rem;
            }
            .upgrade-item .info {
                font-size: 10px;
            }
            .upgrade-item button {
                font-size: 10px;
                padding: 4px 10px;
            }
        }
        @media (max-width: 360px) {
            .dpad {
                width: 90px;
                height: 90px;
                gap: 2px;
            }
            .dpad button {
                font-size: 14px;
                border-radius: 8px;
            }
            .actions button {
                font-size: 9px;
                padding: 3px 6px;
                min-height: 26px;
            }
            .stat {
                font-size: 8px;
            }
            .battery-bar {
                width: 28px;
                height: 7px;
            }
        }
        @media (max-height: 640px) {
            .dpad {
                width: 100px;
                height: 100px;
            }
            .dpad button {
                font-size: 18px;
            }
            .actions button {
                font-size: 10px;
                padding: 4px 8px;
                min-height: 30px;
            }
            .stats-panel {
                padding: 2px 6px;
                min-height: 22px;
            }
            .stat {
                font-size: 9px;
            }
            .controls-tip {
                display: none;
            }
        }
        @media (orientation: landscape) and (max-height: 500px) {
            .dpad {
                width: 80px;
                height: 80px;
                gap: 2px;
            }
            .dpad button {
                font-size: 14px;
                border-radius: 8px;
            }
            .actions button {
                font-size: 9px;
                padding: 3px 6px;
                min-height: 26px;
            }
            .stat {
                font-size: 8px;
            }
            .battery-bar {
                width: 30px;
                height: 6px;
            }
            .stats-panel {
                padding: 2px 4px;
                min-height: 20px;
                gap: 2px 4px;
            }
            .game-status {
                font-size: 7px;
                padding: 0px 5px;
            }
            .controls-tip {
                display: none;
            }
            .canvas-wrapper {
                flex: 2;
            }
        }
    </style>
</head>
<body>
    <div id="app">

        <div class="stats-panel" id="statsPanel">
            <div class="stat"><span class="icon">🏦</span><span class="val" id="bankVal">0</span></div>
            <div class="stat">
                <span class="icon">🔋</span>
                <span class="val" id="batteryVal">100</span>
                <div class="battery-bar"><div class="battery-fill" id="batteryFill" style="width:100%"></div></div>
            </div>
            <div class="stat"><span class="icon">💰</span><span class="val" id="moneyVal">0</span></div>
            <div class="stat"><span class="icon">⚙️</span><span class="val" id="movesVal">0</span></div>
            <div class="stat"><span class="icon">💣</span><span class="val" id="dynamiteCount">0</span></div>
            <div class="game-status" id="gameStatusText">🟢 АКТИВЕН</div>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="gameCanvas" width="440" height="440"></canvas>
        </div>

        <div class="controls">
            <div class="dpad" id="dpad">
                <button class="empty"></button>
                <button id="btnUp" aria-label="Вверх">↑</button>
                <button class="empty"></button>
                <button id="btnLeft" aria-label="Влево">←</button>
                <button class="empty"></button>
                <button id="btnRight" aria-label="Вправо">→</button>
                <button class="empty"></button>
                <button id="btnDown" aria-label="Вниз">↓</button>
                <button class="empty"></button>
            </div>

            <div class="actions">
                <div class="row">
                    <button id="dynamiteUseBtn" class="btn-dynamite">💣</button>
                    <button id="upgradeBtn" class="btn-upgrade">⚡</button>
                </div>
                <div class="row">
                    <button id="resetBtn" class="btn-restart">🔄</button>
                </div>
            </div>
        </div>

        <div class="controls-tip">⬆️⬇️⬅️➡️ — движение  ·  💣 — взрыв 3×3</div>
    </div>

    <div id="upgradeModal" class="modal">
        <div class="modal-content">
            <h3>🔧 ПРОКАЧКА</h3>
            <div class="bank-display">💰 В банке: <span id="modalBank">0</span> монет</div>

            <div class="upgrade-item" id="batteryUpgradePanel">
                <div class="info">
                    <strong>🔋 Батарея</strong><br>
                    <span id="batteryLevelDesc">Уровень 0: +0</span>
                </div>
                <button id="buyBatteryBtn">Купить</button>
            </div>

            <div class="upgrade-item" id="dynamiteUpgradePanel">
                <div class="info">
                    <strong>💣 Динамит</strong><br>
                    <span id="dynamiteLevelDesc">Зарядов: 0</span>
                </div>
                <button id="buyDynamiteBtn">Купить</button>
            </div>

            <div class="upgrade-item" id="fallUpgradePanel">
                <div class="info">
                    <strong>🛡️ Амортизатор</strong><br>
                    <span id="fallLevelDesc">Уровень 0</span>
                </div>
                <button id="buyFallBtn">Улучшить</button>
            </div>

            <button id="closeModalBtn" class="close-modal">ЗАКРЫТЬ</button>
        </div>
    </div>

            let textureImages = {};
            let textureLoaded = {};

            function loadTextureForType(type, url) {
                if (!url || url.trim() === "") { textureLoaded[type] = false;
                    textureImages[type] = null; return; }
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => { textureImages[type] = img;
                    textureLoaded[type] = true;
                    renderView(); };
                img.onerror = () => { console.warn('Текстура не загружена:', TILE_NAMES[type]);
                    textureLoaded[type] = false;
                    textureImages[type] = null;
                    renderView(); };
                img.src = url;
            }

            function loadAllCustomTextures() {
                for (let t = 0; t <= 8; t++) {
                    const url = CUSTOM_TEXTURES[t];
                    if (url && url.trim() !== '') loadTextureForType(t, url);
                    else { textureLoaded[t] = false;
                        textureImages[t] = null; }
                }
            }

            // ---------- ПЕРСИСТЕНТ ----------
            let bankCoins = 0;
            let batteryUpgradeLevel = 0;
            let dynamiteUses = 0;
            let fallProtectionLevel = 0;

            function getBatteryBonus() {
                if (batteryUpgradeLevel === 1) return 10;
                if (batteryUpgradeLevel === 2) return 50;
                if (batteryUpgradeLevel === 3) return 140;
                return 0;
            }

            function getMaxBattery() { return 100 + getBatteryBonus(); }

            function getUpgradeCost(level) {
                if (level === 0) return 10;
                if (level === 1) return 100;
                if (level === 2) return 200;
                return Infinity;
            }
            const DYNAMITE_COST = 100;

            function getFallUpgradeCost(level) {
                if (level === 0) return 50;
                if (level === 1) return 70;
                if (level === 2) return 90;
                if (level === 3) return 150;
                if (level === 4) return 200;
                return Infinity;
            }

            function getFallDamageThreshold() { return fallProtectionLevel + 2; }

            function loadPersistentData() {
                const b = localStorage.getItem('drillBank');
                if (b !== null) bankCoins = parseInt(b) || 0;
                const u = localStorage.getItem('drillBatteryLevel');
                if (u !== null) batteryUpgradeLevel = parseInt(u) || 0;
                const d = localStorage.getItem('drillDynamiteUses');
                if (d !== null) dynamiteUses = parseInt(d) || 0;
                const f = localStorage.getItem('drillFallLevel');
                if (f !== null) fallProtectionLevel = parseInt(f) || 0;
            }

            function savePersistentData() {
                localStorage.setItem('drillBank', bankCoins);
                localStorage.setItem('drillBatteryLevel', batteryUpgradeLevel);
                localStorage.setItem('drillDynamiteUses', dynamiteUses);
                localStorage.setItem('drillFallLevel', fallProtectionLevel);
            }

            let pendingGameMoney = 0;

            function transferGameMoneyToBank() {
                if (pendingGameMoney > 0) { bankCoins += pendingGameMoney;
                    pendingGameMoney = 0;
                    savePersistentData();
                    updateBankUI(); }
            }

            function addGameMoney(amount) {
                if (amount <= 0) return;
                pendingGameMoney += amount;
                updateInGameMoneyUI();
            }

            function updateBankUI() {
                const b = document.getElementById('bankVal');
                if (b) b.innerText = bankCoins;
                const mb = document.getElementById('modalBank');
                if (mb) mb.innerText = bankCoins;
            }

            function updateInGameMoneyUI() {
                const m = document.getElementById('moneyVal');
                if (m) m.innerText = pendingGameMoney;
            }

            function tryBuyBatteryUpgrade() {
                if (batteryUpgradeLevel >= 3) { alert('Максимальный уровень батареи!'); return false; }
                const cost = getUpgradeCost(batteryUpgradeLevel);
                if (bankCoins >= cost) {
                    bankCoins -= cost;
                    batteryUpgradeLevel++;
                    savePersistentData();
                    updateBankUI();
                    updateUpgradeModalInfo();
                    alert('Батарея улучшена до уровня ' + batteryUpgradeLevel + '! +' + getBatteryBonus() + ' к максимуму.');
                    return true;
                } else { alert('Не хватает монет! Нужно ' + cost + ' монет.'); return false; }
            }

            function tryBuyDynamite() {
                if (bankCoins >= DYNAMITE_COST) {
                    bankCoins -= DYNAMITE_COST;
                    dynamiteUses++;
                    savePersistentData();
                    updateBankUI();
                    updateUpgradeModalInfo();
                    if (gameActive) { currentDynamiteCharges++;
                        updateDynamiteUI(); }
                    alert('Куплен заряд динамита! Всего зарядов на игру: ' + dynamiteUses);
                    return true;
                } else { alert('Не хватает монет! Нужно ' + DYNAMITE_COST + ' монет.'); return false; }
            }

            function tryBuyFallProtection() {
                if (fallProtectionLevel >= 5) { alert('Максимальный уровень амортизатора!'); return false; }
                const cost = getFallUpgradeCost(fallProtectionLevel);
                if (bankCoins >= cost) {
                    bankCoins -= cost;
                    fallProtectionLevel++;
                    savePersistentData();
                    updateBankUI();
                    updateUpgradeModalInfo();
                    alert('Амортизатор улучшен до уровня ' + fallProtectionLevel + '! Безопасная высота: ' + (getFallDamageThreshold() -
                        1) + ' блоков.');
                    return true;
                } else { alert('Не хватает монет! Нужно ' + cost + ' монет.'); return false; }
            }

            function updateUpgradeModalInfo() {
                const ds = document.getElementById('batteryLevelDesc');
                if (ds) {
                    const bonus = getBatteryBonus();
                    const next = batteryUpgradeLevel >= 3 ? 'MAX' : getUpgradeCost(batteryUpgradeLevel);
                    ds.innerHTML = 'Уровень ' + batteryUpgradeLevel + ' (бонус +' + bonus + ')<br>След. уровень: ' + (next === 'MAX' ?
                        '—' : next + ' монет');
                }
                const bb = document.getElementById('buyBatteryBtn');
                if (bb) {
                    if (batteryUpgradeLevel >= 3) { bb.innerText = 'МАКСИМУМ';
                        bb.disabled = true; } else { bb.innerText = 'Купить (' + getUpgradeCost(batteryUpgradeLevel) + ' монет)';
                        bb.disabled = false; }
                }
                const dd = document.getElementById('dynamiteLevelDesc');
                if (dd) dd.innerHTML = 'Зарядов на игру: ' + dynamiteUses + '<br>Стоимость заряда: ' + DYNAMITE_COST + ' монет';
                const fd = document.getElementById('fallLevelDesc');
                if (fd) {
                    const th = getFallDamageThreshold();
                    const next = fallProtectionLevel >= 5 ? 'MAX' : getFallUpgradeCost(fallProtectionLevel);
                    fd.innerHTML = 'Уровень ' + fallProtectionLevel + ' (безопасно до ' + (th - 1) + ' блоков)<br>След. уровень: ' +
                        (next === 'MAX' ? '—' : next + ' монет');
                }
                const fb = document.getElementById('buyFallBtn');
                if (fb) {
                    if (fallProtectionLevel >= 5) { fb.innerText = 'МАКСИМУМ';
                        fb.disabled = true; } else { fb.innerText = 'Улучшить (' + getFallUpgradeCost(fallProtectionLevel) +
                            ' монет)';
                        fb.disabled = false; }
                }
            }

            // ---------- ИГРОВОЙ МИР ----------
            let world = [];
            let player = { x: 50, y: 4 };
            let currentBattery = 100;
            let moves = 0;
            let gameActive = true;
            let currentDynamiteCharges = 0;

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            function generateWorld() {
                let w = Array(WORLD_H).fill().map(() => Array(WORLD_W).fill(TILE.STONE));
                for (let y = 0; y < 5; y++)
                    for (let x = 0; x < WORLD_W; x++) w[y][x] = TILE.AIR;
                for (let x = 0; x < WORLD_W; x++) { w[5][x] = TILE.DIRT;
                    w[6][x] = TILE.DIRT; }
                for (let y = 7; y < WORLD_H; y++) {
                    for (let x = 0; x < WORLD_W; x++) {
                        const depth = y;
                        let r = Math.random();
                        if (depth < 14) w[y][x] = r < 0.6 ? TILE.DIRT : TILE.STONE;
                        else if (depth < 30) w[y][x] = r < 0.4 ? TILE.DIRT : TILE.STONE;
                        else w[y][x] = r < 0.3 ? TILE.DIRT : TILE.STONE;
                        if (depth >= 9 && depth < 40 && Math.random() < 0.08) w[y][x] = TILE.COAL;
                        if (depth >= 14 && depth < 55 && Math.random() < 0.035) w[y][x] = TILE.GOLD;
                        if (depth >= 12 && depth < 60 && Math.random() < 0.04) w[y][x] = TILE.RUBY;
                        if (depth >= 18 && depth < 65 && Math.random() < 0.03) w[y][x] = TILE.EMERALD;
                    }
                }

                function addCave(cx, cy, radius) {
                    for (let dy = -radius; dy <= radius; dy++) {
                        for (let dx = -radius; dx <= radius; dx++) {
                            const nx = cx + dx,
                                ny = cy + dy;
                            if (nx >= 0 && nx < WORLD_W && ny >= 0 && ny < WORLD_H) {
                                const dist = Math.sqrt(dx * dx + dy * dy);
                                if (dist <= radius) w[ny][nx] = TILE.AIR;
                                else if (dist <= radius + 1.2 && w[ny][nx] !== TILE.AIR) w[ny][nx] = TILE.CAVE_WALL;
                            }
                        }
                    }
                }
                const count = 16 + Math.floor(Math.random() * 12);
                for (let i = 0; i < count; i++) {
                    const r = 2 + Math.floor(Math.random() * 4);
                    const x = 8 + Math.floor(Math.random() * (WORLD_W - 16));
                    const y = 12 + Math.floor(Math.random() * (WORLD_H - 18));
                    addCave(x, y, r);
                    if (Math.random() > 0.6) {
                        const x2 = x + (Math.random() - 0.5) * 6;
                        const y2 = y + (Math.random() - 0.5) * 5;
                        if (x2 > 2 && x2 < WORLD_W - 2 && y2 > 5 && y2 < WORLD_H - 3) addCave(Math.floor(x2), Math.floor(y2), r -
                            1);
                    }
                }
                if (w[5][50] !== TILE.DIRT) w[5][50] = TILE.DIRT;
                if (w[6][50] !== TILE.DIRT) w[6][50] = TILE.DIRT;
                return w;
            }

            function getTile(x, y) {
                if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) return TILE.STONE;
                return world[y][x];
            }

            function setTile(x, y, type) {
                if (x >= 0 && x < WORLD_W && y >= 0 && y < WORLD_H) world[y][x] = type;
            }

            function updateUI() {
                const bs = document.getElementById('batteryVal');
                if (bs) bs.innerText = Math.max(0, currentBattery);
                const ms = document.getElementById('movesVal');
                if (ms) ms.innerText = moves;
                const pct = (currentBattery / getMaxBattery()) * 100;
                const fill = document.getElementById('batteryFill');
                if (fill) {
                    fill.style.width = Math.max(0, pct) + '%';
                    fill.classList.toggle('low', pct <= 25);
                    fill.classList.toggle('critical', pct <= 10);
                }
            }

            function updateDynamiteUI() {
                const el = document.getElementById('dynamiteCount');
                if (el) el.innerText = currentDynamiteCharges;
            }

            function gameOver(reason) {
                if (!gameActive) return;
                gameActive = false;
                const st = document.getElementById('gameStatusText');
                if (st) { st.innerHTML = '💀 ' + reason;
                    st.className = 'game-status dead'; }
                transferGameMoneyToBank();
                renderView();
            }

            function isSolid(tile) {
                return tile === TILE.DIRT || tile === TILE.STONE || tile === TILE.COAL ||
                    tile === TILE.GOLD || tile === TILE.LADDER || tile === TILE.RUBY || tile === TILE.EMERALD;
            }

            function isDrillable(tile) {
                return tile === TILE.DIRT || tile === TILE.COAL || tile === TILE.GOLD || tile === TILE.RUBY || tile === TILE
                    .EMERALD;
            }

            function getBatteryCost(tile) {
                if (tile === TILE.DIRT) return 2;
                if (tile === TILE.COAL || tile === TILE.GOLD || tile === TILE.RUBY || tile === TILE.EMERALD) return 3;
                return 1;
            }

            function getOreValue(tile) {
                if (tile === TILE.COAL) return 1;
                if (tile === TILE.GOLD) return 10;
                if (tile === TILE.RUBY) return 5;
                if (tile === TILE.EMERALD) return 8;
                return 0;
            }

            function applyFallAndDamage() {
                if (isSolid(getTile(player.x, player.y + 1))) return true;
                let fallDist = 0;
                while (true) {
                    const below = getTile(player.x, player.y + 1);
                    if (!isSolid(below)) {
                        const cost = getBatteryCost(below);
                        if (currentBattery - cost < 0) { gameOver('батарея разрядилась во время падения'); return false; }
                        currentBattery -= cost;
                        fallDist++;
                        player.y++;
                        moves++;
                        updateUI();
                        if (player.y >= WORLD_H) { gameOver('упал в бездну'); return false; }
                    } else break;
                }
                const threshold = getFallDamageThreshold();
                if (fallDist >= threshold) {
                    currentBattery = 0;
                    updateUI();
                    gameOver('падение с высоты ' + fallDist + ' блоков (безопасно до ' + (threshold - 1) + ')');
                    return false;
                }
                return true;
            }

            function tryMove(dx, dy) {
                if (!gameActive) return false;
                const nx = player.x + dx,
                    ny = player.y + dy;
                if (nx < 0 || nx >= WORLD_W || ny < 0 || ny >= WORLD_H) return false;
                const target = getTile(nx, ny);
                if (target === TILE.STONE) return false;
                let cost = getBatteryCost(target);
                if (currentBattery - cost < 0) { gameOver('батарея разрядилась...');
                    renderView(); return false; }
                let addMoney = 0,
                    willRemove = false;
                if (isDrillable(target)) {
                    willRemove = true;
                    addMoney = getOreValue(target);
                    if (addMoney > 0) addGameMoney(addMoney);
                }
                const oldX = player.x,
                    oldY = player.y;
                currentBattery -= cost;
                moves++;
                if (willRemove) setTile(nx, ny, TILE.AIR);
                player.x = nx;
                player.y = ny;
                if (dy === -1 && dx === 0) {
                    const oldTile = getTile(oldX, oldY);
                    if (oldTile !== TILE.STONE && oldTile !== TILE.LADDER) setTile(oldX, oldY, TILE.LADDER);
                }
                updateUI();
                renderView();
                if (!applyFallAndDamage()) return false;
                if (currentBattery <= 0) { gameOver('батарея исчерпана!');
                    renderView(); return false; }
                renderView();
                return true;
            }

            function useDynamite() {
                if (!gameActive) { alert('Игра не активна'); return; }
                if (currentDynamiteCharges <= 0) { alert('Нет зарядов динамита! Купите в магазине.'); return; }
                let earned = 0;
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const x = player.x + dx,
                            y = player.y + dy;
                        if (x >= 0 && x < WORLD_W && y >= 0 && y < WORLD_H) {
                            const tile = getTile(x, y);
                            if (tile !== TILE.AIR) {
                                earned += getOreValue(tile);
                                setTile(x, y, TILE.AIR);
                            }
                        }
                    }
                }
                if (earned > 0) addGameMoney(earned);
                currentDynamiteCharges--;
                updateDynamiteUI();
                renderView();
                if (!applyFallAndDamage()) return;
                renderView();
            }

            // ---------- ОТРИСОВКА ----------
            function drawTile(ctx, x, y, type) {
                if (textureLoaded[type] && textureImages[type]) {
                    ctx.drawImage(textureImages[type], x, y, TILE_SIZE, TILE_SIZE);
                    ctx.strokeStyle = '#2c2118';
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                    return;
                }
                switch (type) {
                    case TILE.AIR:
                        ctx.fillStyle = '#2c3e36';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#3e5a4e';
                        ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                        break;
                    case TILE.DIRT:
                        ctx.fillStyle = '#8b5a2b';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#ac743a';
                        for (let i = 0; i < 6; i++) ctx.fillRect(x + 5 + (i * 5), y + 18, 3, 8);
                        ctx.fillStyle = '#6b3e1a';
                        ctx.fillRect(x + 12, y + 28, 8, 4);
                        break;
                    case TILE.STONE:
                        ctx.fillStyle = '#5a5a66';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#7e7e8c';
                        for (let i = 0; i < 8; i++) ctx.fillRect(x + 4 + (i * 5), y + 12, 3, 12);
                        ctx.fillStyle = '#42424d';
                        ctx.fillRect(x + 20, y + 28, 12, 5);
                        break;
                    case TILE.COAL:
                        ctx.fillStyle = '#2d2b2a';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#1f1d1c';
                        ctx.fillRect(x + 8, y + 8, 24, 24);
                        ctx.fillStyle = '#4a3e3a';
                        ctx.fillRect(x + 14, y + 20, 12, 5);
                        break;
                    case TILE.GOLD:
                        ctx.fillStyle = '#e6b422';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#ffd966';
                        for (let s = 0; s < 3; s++) ctx.fillRect(x + 10 + s * 8, y + 16, 5, 12);
                        ctx.fillStyle = '#c97e2a';
                        ctx.fillRect(x + 18, y + 28, 8, 4);
                        break;
                    case TILE.CAVE_WALL:
                        ctx.fillStyle = '#6f5843';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#9b7b5c';
                        ctx.fillRect(x + 4, y + 12, 8, 8);
                        ctx.fillRect(x + 24, y + 24, 8, 8);
                        ctx.fillStyle = '#c9ae86';
                        ctx.fillRect(x + 16, y + 28, 5, 5);
                        break;
                    case TILE.LADDER:
                        ctx.fillStyle = '#bc9a6c';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#e1c394';
                        for (let i = 0; i < 4; i++) { ctx.fillRect(x + 8, y + 6 + i * 10, 24, 3);
                            ctx.fillRect(x + 18, y + 2 + i * 10, 5, 14); }
                        ctx.fillStyle = '#8b5a2b';
                        ctx.fillRect(x + 18, y + 12, 5, 20);
                        break;
                    case TILE.RUBY:
                        ctx.fillStyle = '#a51f2f';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#e34234';
                        ctx.beginPath();
                        ctx.moveTo(x + 20, y + 10);
                        ctx.lineTo(x + 30, y + 25);
                        ctx.lineTo(x + 20, y + 35);
                        ctx.lineTo(x + 10, y + 25);
                        ctx.fill();
                        ctx.fillStyle = '#ff7f6e';
                        ctx.fillRect(x + 16, y + 22, 8, 6);
                        break;
                    case TILE.EMERALD:
                        ctx.fillStyle = '#2e7032';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#50c878';
                        ctx.beginPath();
                        ctx.moveTo(x + 20, y + 8);
                        ctx.lineTo(x + 32, y + 20);
                        ctx.lineTo(x + 20, y + 32);
                        ctx.lineTo(x + 8, y + 20);
                        ctx.fill();
                        ctx.fillStyle = '#b0ffb0';
                        ctx.fillRect(x + 16, y + 18, 8, 5);
                        break;
                    default:
                        ctx.fillStyle = '#2e2b26';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                }
                ctx.strokeStyle = '#2c2118';
                ctx.lineWidth = 0.5;
                ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
            }

            function renderView() {
                if (!canvas) return;
                ctx.clearRect(0, 0, 440, 440);
                const camX = player.x - Math.floor(VIEW_SIZE / 2);
                const camY = player.y - Math.floor(VIEW_SIZE / 2);
                for (let row = 0; row < VIEW_SIZE; row++) {
                    for (let col = 0; col < VIEW_SIZE; col++) {
                        const wx = camX + col,
                            wy = camY + row;
                        let tile = TILE.AIR;
                        if (wx >= 0 && wx < WORLD_W && wy >= 0 && wy < WORLD_H) tile = world[wy][wx];
                        else tile = TILE.STONE;
                        const xPos = col * TILE_SIZE,
                            yPos = row * TILE_SIZE;
                        drawTile(ctx, xPos, yPos, tile);
                        if (wx === player.x && wy === player.y) {
                            ctx.save();
                            ctx.shadowBlur = 0;
                            ctx.beginPath();
                            ctx.rect(xPos + 2, yPos + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                            ctx.fillStyle = '#445c6e';
                            ctx.fill();
                            ctx.fillStyle = '#8fc5e8';
                            ctx.font = 'bold ' + (TILE_SIZE - 12) + 'px monospace';
                            ctx.fillText('⚙', xPos + 8, yPos + TILE_SIZE - 10);
                            ctx.fillStyle = '#f2c94c';
                            ctx.font = (TILE_SIZE - 14) + 'px monospace';
                            ctx.fillText('⛏️', xPos + 12, yPos + TILE_SIZE - 14);
                            ctx.restore();
                            ctx.strokeStyle = '#ffd966';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(xPos + 1, yPos + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                        }
                    }
                }
                if (!gameActive) {
                    ctx.fillStyle = 'rgba(0,0,0,0.65)';
                    ctx.fillRect(0, 0, 440, 440);
                    ctx.fillStyle = '#ffbe76';
                    ctx.font = 'bold 20px monospace';
                    ctx.fillText('GAME OVER', 140, 220);
                }
            }

            // ---------- УПРАВЛЕНИЕ ----------
            function restartGame() {
                if (gameActive && pendingGameMoney > 0) transferGameMoneyToBank();
                world = generateWorld();
                player = { x: 50, y: 4 };
                currentBattery = getMaxBattery();
                moves = 0;
                gameActive = true;
                currentDynamiteCharges = dynamiteUses;
                pendingGameMoney = 0;
                updateInGameMoneyUI();
                updateUI();
                updateDynamiteUI();
                const st = document.getElementById('gameStatusText');
                if (st) { st.innerHTML = '🟢 АКТИВЕН';
                    st.className = 'game-status'; }
                if (!isSolid(getTile(player.x, player.y + 1))) setTile(player.x, player.y + 1, TILE.DIRT);
                renderView();
            }

            // ---------- МОДАЛКА ----------
            function openUpgradeModal() { updateBankUI();
                updateUpgradeModalInfo();
                document.getElementById('upgradeModal').style.display = 'flex'; }

            function closeUpgradeModal() { document.getElementById('upgradeModal').style.display = 'none'; }

            // ---------- РАЗМЕР КАНВАСА ----------
            function resizeCanvas() {
                const wrapper = document.getElementById('canvasWrapper');
                if (!wrapper) return;
                const rect = wrapper.getBoundingClientRect();
                const size = Math.min(rect.width, rect.height);
                if (size > 0) {
                    canvas.style.width = size + 'px';
                    canvas.style.height = size + 'px';
                }
            }

            // ---------- ИНИЦИАЛИЗАЦИЯ ----------
            loadPersistentData();
            world = generateWorld();
            currentBattery = getMaxBattery();
            player = { x: 50, y: 4 };
            moves = 0;
            gameActive = true;
            currentDynamiteCharges = dynamiteUses;
            pendingGameMoney = 0;
            updateInGameMoneyUI();
            updateUI();
            updateBankUI();
            updateDynamiteUI();
            if (!isSolid(getTile(player.x, player.y + 1))) setTile(player.x, player.y + 1, TILE.DIRT);
            loadAllCustomTextures();
            renderView();

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));
            const ro = new ResizeObserver(() => resizeCanvas());
            const wrapper = document.getElementById('canvasWrapper');
            if (wrapper) ro.observe(wrapper);

            // ---------- СОБЫТИЯ КНОПОК ----------
            // D-Pad (touchstart + mousedown)
            document.getElementById('btnUp').addEventListener('touchstart', e => { e.preventDefault();
                tryMove(0, -1); });
            document.getElementById('btnDown').addEventListener('touchstart', e => { e.preventDefault();
                tryMove(0, 1); });
            document.getElementById('btnLeft').addEventListener('touchstart', e => { e.preventDefault();
                tryMove(-1, 0); });
            document.getElementById('btnRight').addEventListener('touchstart', e => { e.preventDefault();
                tryMove(1, 0); });
            // Для мыши
            document.getElementById('btnUp').addEventListener('mousedown', e => { e.preventDefault();
                tryMove(0, -1); });
            document.getElementById('btnDown').addEventListener('mousedown', e => { e.preventDefault();
                tryMove(0, 1); });
            document.getElementById('btnLeft').addEventListener('mousedown', e => { e.preventDefault();
                tryMove(-1, 0); });
            document.getElementById('btnRight').addEventListener('mousedown', e => { e.preventDefault();
                tryMove(1, 0); });

            // Остальные кнопки — только click, без блокировки touch
            document.getElementById('resetBtn').addEventListener('click', () => restartGame());
            document.getElementById('upgradeBtn').addEventListener('click', openUpgradeModal);
            document.getElementById('closeModalBtn').addEventListener('click', closeUpgradeModal);
            document.getElementById('dynamiteUseBtn').addEventListener('click', () => useDynamite());
            document.getElementById('buyBatteryBtn').addEventListener('click', () => tryBuyBatteryUpgrade());
            document.getElementById('buyDynamiteBtn').addEventListener('click', () => tryBuyDynamite());
            document.getElementById('buyFallBtn').addEventListener('click', () => tryBuyFallProtection());
            window.addEventListener('click', (e) => { if (e.target === document.getElementById('upgradeModal'))
                closeUpgradeModal(); });

            // Клавиши для десктопа
            window.addEventListener('keydown', (e) => {
                if (!gameActive) return;
                let dx = 0,
                    dy = 0;
                if (e.key === 'ArrowUp') dy = -1;
                else if (e.key === 'ArrowDown') dy = 1;
                else if (e.key === 'ArrowLeft') dx = -1;
                else if (e.key === 'ArrowRight') dx = 1;
                else return;
                e.preventDefault();
                tryMove(dx, dy);
            });

            console.log('🔥 Drill Miner Mobile готов!');
        })();
    </script>
</body>
</html>
