<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Лабиринт: Поиск пути (туман войны)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            min-height: 100vh;
            touch-action: none;
            overflow: hidden;
        }
        #app {
            width: 100%;
            max-width: 700px;
            height: 100dvh;
            height: 100vh;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            background: #16213e;
            border-radius: 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            position: relative;
        }
        @media (min-width: 720px) {
            #app { border-radius: 28px; height: 95vh; max-height: 920px; }
        }
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #0f3460;
            flex-shrink: 0;
            min-height: 52px;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 2px solid #1a4a7a;
            z-index: 5;
        }
        #header .title {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }
        #header .info {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 14px;
            font-weight: 500;
            flex-wrap: wrap;
        }
        #header .info .badge {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.08);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
        }
        #header .info .badge .icon { font-size: 16px; line-height: 1; }
        #header .info .badge .value { font-weight: 600; min-width: 20px; text-align: center; }
        #header .key-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px 4px 8px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.25);
            color: #ffd700;
            transition: all 0.3s;
        }
        #header .key-indicator.has-key {
            background: rgba(255, 215, 0, 0.30);
            border-color: #ffd700;
            box-shadow: 0 0 16px rgba(255, 215, 0, 0.15);
        }
        .btn-menu {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #ccc;
            font-size: 20px;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }
        .btn-menu:hover { background: rgba(255, 255, 255, 0.18); color: #fff; }
        .btn-menu:active { transform: scale(0.92); }
        #canvas-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            min-height: 0;
            background: #0d1b2a;
            position: relative;
        }
        #mazeCanvas {
            display: block;
            background: #1e2a3a;
            border-radius: 12px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            touch-action: none;
            cursor: pointer;
        }
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(13, 27, 42, 0.92);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 30px 24px;
            z-index: 10;
            border-radius: inherit;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            text-align: center;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .overlay h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .overlay .sub { font-size: 16px; color: #aac; margin-bottom: 20px; }
        .overlay .stats { font-size: 18px; color: #ccd; margin-bottom: 20px; line-height: 1.6; }
        .overlay .stats span { font-weight: 700; color: #ffd700; }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 6px;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            color: #fff;
            background: #1a4a7a;
            box-shadow: 0 4px 0 #0d2a4a;
            touch-action: manipulation;
            min-width: 80px;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0d2a4a; }
        .btn-primary { background: #e67e22; box-shadow: 0 4px 0 #b85e1a; }
        .btn-primary:active { box-shadow: 0 1px 0 #b85e1a; }
        .btn-success { background: #27ae60; box-shadow: 0 4px 0 #1a7a42; }
        .btn-success:active { box-shadow: 0 1px 0 #1a7a42; }
        .btn-outline { background: transparent; box-shadow: 0 0 0 2px #4a6a8a; color: #aac; }
        .btn-outline:active { background: rgba(255, 255, 255, 0.05); transform: translateY(2px); box-shadow: 0 0 0 2px #4a6a8a; }
        .btn-sm { padding: 8px 16px; font-size: 14px; min-width: 60px; }
        .level-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 12px 0 18px;
        }
        .level-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid #2a4a6a;
            background: transparent;
            color: #aac;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            min-width: 70px;
            touch-action: manipulation;
        }
        .level-btn:hover { border-color: #4a8aba; color: #fff; }
        .level-btn.active {
            border-color: #f7971e;
            background: rgba(247, 151, 30, 0.15);
            color: #ffd700;
            box-shadow: 0 0 20px rgba(247, 151, 30, 0.10);
        }
        .level-btn .size { display: block; font-size: 11px; font-weight: 400; color: #668; margin-top: 2px; }
        .level-btn.active .size { color: #aac; }
        #controls {
            display: grid;
            grid-template-columns: 72px 72px 72px;
            grid-template-rows: 60px 60px 60px;
            gap: 4px;
            justify-content: center;
            padding: 10px 12px 14px;
            flex-shrink: 0;
            background: #0f1a2e;
            border-top: 2px solid #1a2a44;
            touch-action: none;
        }
        #controls .ctrl-btn {
            border: none;
            border-radius: 14px;
            font-size: 28px;
            color: #ccd;
            background: #1a2a44;
            box-shadow: 0 4px 0 #0a1628, inset 0 1px 0 rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: 0.08s linear;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        #controls .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0a1628;
            background: #2a4a6a;
        }
        #controls .ctrl-btn:disabled {
            opacity: 0.3;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0a1628;
            pointer-events: none;
        }
        .ctrl-up { grid-column: 2; grid-row: 1; }
        .ctrl-left { grid-column: 1; grid-row: 2; }
        .ctrl-right { grid-column: 3; grid-row: 2; }
        .ctrl-down { grid-column: 2; grid-row: 3; }
        #controls .ctrl-extra {
            grid-column: 2;
            grid-row: 2;
            background: transparent;
            box-shadow: none;
            font-size: 14px;
            color: #668;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        #controls .ctrl-extra .small {
            font-size: 10px;
            color: #445;
            pointer-events: auto;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
        }
        #controls .ctrl-extra .small:active { background: rgba(255, 255, 255, 0.15); }
        @media (max-width: 480px) {
            #header .title { font-size: 14px; }
            #header .info .badge { font-size: 11px; padding: 3px 7px; }
            #header .info .badge .icon { font-size: 13px; }
            .overlay h1 { font-size: 26px; }
            .btn { padding: 10px 20px; font-size: 14px; min-width: 60px; }
            #controls {
                grid-template-columns: 60px 60px 60px;
                grid-template-rows: 50px 50px 50px;
                padding: 8px 8px 12px;
                gap: 3px;
            }
            #controls .ctrl-btn { font-size: 22px; border-radius: 12px; }
        }
        @media (max-width: 380px) {
            #controls {
                grid-template-columns: 52px 52px 52px;
                grid-template-rows: 44px 44px 44px;
                padding: 6px 6px 10px;
            }
            #controls .ctrl-btn { font-size: 18px; border-radius: 10px; }
            #header .title { font-size: 12px; }
            #header .info .badge { font-size: 10px; padding: 2px 6px; }
        }
        @media (orientation: landscape) and (max-height: 500px) {
            #header { padding: 4px 12px; min-height: 36px; }
            #header .title { font-size: 13px; }
            #controls {
                grid-template-columns: 48px 48px 48px;
                grid-template-rows: 38px 38px 38px;
                padding: 4px 8px 8px;
                gap: 3px;
            }
            #controls .ctrl-btn { font-size: 16px; border-radius: 8px; }
            #canvas-wrapper { padding: 3px; }
        }
        @keyframes pulse-glow {
            0%,100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { text-shadow: 0 0 50px rgba(255, 215, 0, 0.7), 0 0 80px rgba(255, 215, 0, 0.3); }
        }
        .win-title { animation: pulse-glow 1.8s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0d1b2a; }
        ::-webkit-scrollbar-thumb { background: #2a4a6a; border-radius: 4px; }
    </style>
</head>
<body>
<div id="app">
    <header id="header">
        <span class="title">🧭 Лабиринт</span>
        <div class="info">
            <span class="badge"><span class="icon">👣</span><span class="value" id="stepCounter">0</span></span>
            <span class="badge"><span class="icon">⏱</span><span class="value" id="timerDisplay">0</span></span>
            <span class="key-indicator" id="keyIndicator">
                <span>🔑</span><span id="keyStatus">нет</span>
            </span>
            <button class="btn-menu" id="menuBtn" title="Меню">☰</button>
        </div>
    </header>
    <div id="canvas-wrapper">
        <canvas id="mazeCanvas"></canvas>
        <div class="overlay active" id="menuOverlay">
            <h1>🧭 Лабиринт</h1>
            <p class="sub">Найди ключ и выйди из лабиринта</p>
            <div class="level-grid">
                <button class="level-btn active" data-size="15">🟢 Лёгкий<span class="size">15×15</span></button>
                <button class="level-btn" data-size="30">🟡 Средний<span class="size">30×30</span></button>
                <button class="level-btn" data-size="50">🟠 Сложный<span class="size">50×50</span></button>
                <button class="level-btn" data-size="100">🔴 Хардкор<span class="size">100×100</span></button>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="startBtn">🚀 Начать игру</button>
            </div>
            <p style="margin-top:16px;font-size:13px;color:#556;max-width:280px;">👆 Управляй свайпами или кнопками</p>
        </div>
        <div class="overlay" id="winOverlay">
            <h1 class="win-title">🎉 Вы вышли!</h1>
            <p class="sub">Лабиринт покорён!</p>
            <div class="stats">
                <div>👣 Шагов: <span id="winSteps">0</span></div>
                <div>⏱ Время: <span id="winTime">0</span> сек</div>
                <div style="font-size:14px;color:#889;margin-top:4px;">Уровень: <span id="winLevel">—</span></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-success" id="replayBtn">🔄 Играть снова</button>
                <button class="btn btn-outline" id="winMenuBtn">📋 Выбрать уровень</button>
            </div>
        </div>
    </div>
    <div id="controls">
        <button class="ctrl-btn ctrl-up" data-dir="up">▲</button>
        <button class="ctrl-btn ctrl-left" data-dir="left">◄</button>
        <button class="ctrl-btn ctrl-right" data-dir="right">►</button>
        <button class="ctrl-btn ctrl-down" data-dir="down">▼</button>
        <div class="ctrl-extra"><span>🔁</span><span class="small" id="restartLabel">рестарт</span></div>
    </div>
</div>

<script>
(function() {
    'use strict';

    const PLAYER_IMAGE_BASE64 = ''; // своё изображение

    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');
    const stepCounter = document.getElementById('stepCounter');
    const timerDisplay = document.getElementById('timerDisplay');
    const keyIndicator = document.getElementById('keyIndicator');
    const keyStatus = document.getElementById('keyStatus');
    const menuOverlay = document.getElementById('menuOverlay');
    const winOverlay = document.getElementById('winOverlay');
    const winSteps = document.getElementById('winSteps');
    const winTime = document.getElementById('winTime');
    const winLevel = document.getElementById('winLevel');
    const startBtn = document.getElementById('startBtn');
    const menuBtn = document.getElementById('menuBtn');
    const replayBtn = document.getElementById('replayBtn');
    const winMenuBtn = document.getElementById('winMenuBtn');
    const restartLabel = document.getElementById('restartLabel');
    const levelBtns = document.querySelectorAll('.level-btn');

    const state = {
        size: 15,
        cells: [],
        player: { r: 0, c: 0 },
        key: { r: 0, c: 0 },
        exit: { r: 0, c: 0 },
        keyCollected: false,
        steps: 0,
        startTime: 0,
        elapsed: 0,
        gameActive: false,
        gameWon: false,
        isPlaying: false,
        timerInterval: null,
        direction: { dr: 0, dc: 1 },
    };

    let canvasSize = 0;
    let dpr = 1;
    let playerImage = null;
    let imageLoaded = false;

    // === Блокировка свайпов ===
    let swipeLocked = false;

    if (PLAYER_IMAGE_BASE64) {
        playerImage = new Image();
        playerImage.onload = () => { imageLoaded = true; drawNow(); };
        playerImage.onerror = () => { console.warn('Изображение не загружено'); imageLoaded = false; };
        playerImage.src = PLAYER_IMAGE_BASE64;
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    // --- Генерация лабиринта (без изменений) ---
    function generateMaze(size) {
        const cells = [];
        for (let r = 0; r < size; r++) {
            const row = [];
            for (let c = 0; c < size; c++) row.push({ top: true, right: true, bottom: true, left: true, visited: false });
            cells.push(row);
        }
        const stack = [[0, 0]];
        cells[0][0].visited = true;
        const dirs = [[-1,0,'top','bottom'],[0,1,'right','left'],[1,0,'bottom','top'],[0,-1,'left','right']];
        while (stack.length) {
            const [r, c] = stack[stack.length-1];
            const neighbors = [];
            for (const [dr, dc, wallA, wallB] of dirs) {
                const nr = r+dr, nc = c+dc;
                if (nr>=0 && nr<size && nc>=0 && nc<size && !cells[nr][nc].visited) neighbors.push([nr, nc, wallA, wallB]);
            }
            if (!neighbors.length) { stack.pop(); continue; }
            const idx = Math.floor(Math.random() * neighbors.length);
            const [nr, nc, wallA, wallB] = neighbors[idx];
            cells[r][c][wallA] = false;
            cells[nr][nc][wallB] = false;
            cells[nr][nc].visited = true;
            stack.push([nr, nc]);
        }
        cells.forEach(row => row.forEach(cell => delete cell.visited));
        return cells;
    }

    function placeKeyAndExit(size) {
        const border = [];
        for (let i = 1; i < size-1; i++) {
            border.push([0,i], [size-1,i], [i,0], [i,size-1]);
        }
        const unique = [...new Set(border.map(p => p.join(',')))].map(s => s.split(',').map(Number));
        for (let i = unique.length-1; i > 0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [unique[i], unique[j]] = [unique[j], unique[i]];
        }
        let keyPos = unique[0], exitPos = unique[1];
        let attempts = 0;
        while (attempts++ < 100 && Math.abs(keyPos[0]-exitPos[0]) + Math.abs(keyPos[1]-exitPos[1]) <= 2) {
            const i1 = Math.floor(Math.random()*unique.length);
            let i2 = Math.floor(Math.random()*unique.length);
            while (i2 === i1) i2 = Math.floor(Math.random()*unique.length);
            keyPos = unique[i1]; exitPos = unique[i2];
        }
        return { key: { r: keyPos[0], c: keyPos[1] }, exit: { r: exitPos[0], c: exitPos[1] } };
    }

    // --- Мгновенная отрисовка (без requestAnimationFrame) ---
    function drawNow() {
        const w = canvasSize, h = canvasSize;
        ctx.clearRect(0, 0, w, h);

        if (!state.isPlaying) {
            const cs = canvasSize / state.size;
            ctx.fillStyle = '#1e2a3a'; ctx.fillRect(0, 0, w, h);
            ctx.strokeStyle = '#8a9bb5'; ctx.lineWidth = Math.max(1, cs*0.08);
            ctx.beginPath();
            for (let r = 0; r < state.size; r++) {
                for (let c = 0; c < state.size; c++) {
                    const cell = state.cells[r][c];
                    const x = c*cs, y = r*cs;
                    if (cell.top) { ctx.moveTo(x, y); ctx.lineTo(x+cs, y); }
                    if (cell.right) { ctx.moveTo(x+cs, y); ctx.lineTo(x+cs, y+cs); }
                    if (cell.bottom) { ctx.moveTo(x+cs, y+cs); ctx.lineTo(x, y+cs); }
                    if (cell.left) { ctx.moveTo(x, y+cs); ctx.lineTo(x, y); }
                }
            }
            ctx.stroke();
            if (state.key && state.exit) {
                const rad = cs*0.3;
                const ex = state.exit, k = state.key;
                ctx.fillStyle = '#7f8c8d'; ctx.beginPath(); ctx.arc(ex.c*cs+cs/2, ex.r*cs+cs/2, rad, 0, 2*Math.PI); ctx.fill();
                ctx.fillStyle = '#95a5a6'; ctx.font = `${cs*0.32}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.fillText('🔒', ex.c*cs+cs/2, ex.r*cs+cs/2+1);
                ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(k.c*cs+cs/2, k.r*cs+cs/2, rad*0.8, 0, 2*Math.PI); ctx.fill();
                ctx.fillStyle = '#b7950b'; ctx.fillText('🔑', k.c*cs+cs/2, k.r*cs+cs/2+1);
            }
            if (state.player) {
                const p = state.player;
                ctx.shadowColor = '#3498db'; ctx.shadowBlur = cs*0.5;
                ctx.fillStyle = '#2980b9'; ctx.beginPath(); ctx.arc(p.c*cs+cs/2, p.r*cs+cs/2, cs*0.35, 0, 2*Math.PI); ctx.fill();
                ctx.shadowBlur = 0;
            }
            return;
        }

        const half = 2;
        const pr = state.player.r, pc = state.player.c;
        let startRow = clamp(pr - half, 0, state.size - 5);
        let startCol = clamp(pc - half, 0, state.size - 5);
        if (state.size < 5) { startRow = 0; startCol = 0; }
        const cs = canvasSize / 5;

        ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = '#8a9bb5'; ctx.lineWidth = Math.max(1, cs*0.08);
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j < 5; j++) {
                const r = startRow + i, c = startCol + j;
                if (r < 0 || r >= state.size || c < 0 || c >= state.size) continue;
                const cell = state.cells[r][c];
                const x = j*cs, y = i*cs;
                if (cell.top) { ctx.moveTo(x, y); ctx.lineTo(x+cs, y); }
                if (cell.right) { ctx.moveTo(x+cs, y); ctx.lineTo(x+cs, y+cs); }
                if (cell.bottom) { ctx.moveTo(x+cs, y+cs); ctx.lineTo(x, y+cs); }
                if (cell.left) { ctx.moveTo(x, y+cs); ctx.lineTo(x, y); }
            }
        }
        ctx.stroke();

        if (!state.keyCollected) {
            const kr = state.key.r, kc = state.key.c;
            if (kr >= startRow && kr < startRow+5 && kc >= startCol && kc < startCol+5) {
                const x = (kc-startCol)*cs+cs/2, y = (kr-startRow)*cs+cs/2;
                ctx.shadowColor = '#f1c40f'; ctx.shadowBlur = cs*0.4;
                ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(x, y, cs*0.24, 0, 2*Math.PI); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#b7950b'; ctx.font = `${cs*0.32}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.fillText('🔑', x, y+1);
            }
        }

        const er = state.exit.r, ec = state.exit.c;
        if (er >= startRow && er < startRow+5 && ec >= startCol && ec < startCol+5) {
            const x = (ec-startCol)*cs+cs/2, y = (er-startRow)*cs+cs/2;
            const rad = cs*0.3;
            ctx.shadowColor = state.keyCollected ? '#2ecc71' : 'transparent';
            ctx.shadowBlur = state.keyCollected ? cs*0.5 : 0;
            ctx.fillStyle = state.keyCollected ? '#2ecc71' : '#7f8c8d';
            ctx.beginPath(); ctx.arc(x, y, rad, 0, 2*Math.PI); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = state.keyCollected ? '#27ae60' : '#5a6a7a';
            ctx.lineWidth = Math.max(1.5, cs*0.06);
            ctx.beginPath(); ctx.arc(x, y, rad, 0, 2*Math.PI); ctx.stroke();
            ctx.fillStyle = state.keyCollected ? '#fff' : '#95a5a6';
            ctx.font = `${cs*0.32}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(state.keyCollected ? '🚪' : '🔒', x, y+1);
        }

        // Игрок
        const lr = state.player.r - startRow, lc = state.player.c - startCol;
        if (lr >= -0.5 && lr < 5.5 && lc >= -0.5 && lc < 5.5) {
            const px = lc * cs + cs/2, py = lr * cs + cs/2;
            const radius = cs * 0.32;
            let angle = 0;
            const { dr, dc } = state.direction;
            if (dr === -1 && dc === 0) angle = -Math.PI/2;
            else if (dr === 1 && dc === 0) angle = Math.PI/2;
            else if (dr === 0 && dc === -1) angle = Math.PI;
            ctx.save(); ctx.translate(px, py); ctx.rotate(angle);
            if (imageLoaded && playerImage) {
                const s = radius*2.2;
                ctx.drawImage(playerImage, -s/2, -s/2, s, s);
            } else {
                ctx.shadowColor = '#3498db'; ctx.shadowBlur = cs*0.5;
                const grad = ctx.createRadialGradient(-cs*0.06, -cs*0.06, 0, 0, 0, radius*0.9);
                grad.addColorStop(0, '#5dade2'); grad.addColorStop(0.7, '#2980b9'); grad.addColorStop(1, '#1a5276');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, radius, 0, 2*Math.PI); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#aed6f1'; ctx.lineWidth = Math.max(1, cs*0.04);
                ctx.beginPath(); ctx.arc(0, 0, radius, 0, 2*Math.PI); ctx.stroke();
                const eOff = cs*0.1, eR = cs*0.05;
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(-eOff, -cs*0.05, eR, 0, 2*Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(eOff, -cs*0.05, eR, 0, 2*Math.PI); ctx.fill();
                ctx.fillStyle = '#1a2a3a';
                ctx.beginPath(); ctx.arc(-eOff+cs*0.02, -cs*0.03, eR*0.5, 0, 2*Math.PI); ctx.fill();
                ctx.beginPath(); ctx.arc(eOff+cs*0.02, -cs*0.03, eR*0.5, 0, 2*Math.PI); ctx.fill();
            }
            ctx.restore();
        }
    }

    // Перемещение (мгновенное)
    function tryMove(dr, dc) {
        if (!state.gameActive || state.gameWon || !state.isPlaying) return false;
        // Если движение заблокировано свайпом, но кнопки всё равно работают (разблокируем при touchend)
        const r = state.player.r, c = state.player.c;
        const nr = r+dr, nc = c+dc;
        if (nr<0 || nr>=state.size || nc<0 || nc>=state.size) return false;
        const cell = state.cells[r][c];
        if ((dr===-1 && cell.top) || (dr===1 && cell.bottom) || (dc===-1 && cell.left) || (dc===1 && cell.right)) return false;
        const nCell = state.cells[nr][nc];
        if ((dr===-1 && nCell.bottom) || (dr===1 && nCell.top) || (dc===-1 && nCell.right) || (dc===1 && nCell.left)) return false;

        state.direction = { dr, dc };

        let keyCollected = state.keyCollected;
        if (!keyCollected && nr === state.key.r && nc === state.key.c) {
            keyCollected = true;
            state.keyCollected = true;
            keyIndicator.classList.add('has-key');
            keyStatus.textContent = 'есть';
        }

        state.player.r = nr;
        state.player.c = nc;
        state.steps++;
        stepCounter.textContent = state.steps;

        if (nr === state.exit.r && nc === state.exit.c) {
            if (keyCollected) {
                winGame();
            } else {
                flashExitMessage();
            }
            drawNow();
            return true;
        }

        updateUI();
        drawNow();  // мгновенная перерисовка
        return true;
    }

    function flashExitMessage() {
        keyStatus.textContent = '🔒 нужен ключ!';
        const half = 2;
        const pr = state.player.r, pc = state.player.c;
        let startRow = clamp(pr-half, 0, state.size-5);
        let startCol = clamp(pc-half, 0, state.size-5);
        const er = state.exit.r, ec = state.exit.c;
        if (er>=startRow && er<startRow+5 && ec>=startCol && ec<startCol+5) {
            const cs = canvasSize/5;
            ctx.fillStyle = 'rgba(231,76,60,0.35)';
            ctx.fillRect((ec-startCol)*cs, (er-startRow)*cs, cs, cs);
        }
        setTimeout(() => {
            keyStatus.textContent = state.keyCollected ? 'есть' : 'нет';
            drawNow();
        }, 500);
    }

    function winGame() {
        state.gameWon = true;
        state.isPlaying = false;
        state.gameActive = false;
        if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
        state.elapsed = Math.floor((Date.now()-state.startTime)/1000);
        winSteps.textContent = state.steps;
        winTime.textContent = state.elapsed;
        const names = {15:'Лёгкий',30:'Средний',50:'Сложный',100:'Хардкор'};
        winLevel.textContent = names[state.size] || state.size+'×'+state.size;
        winOverlay.classList.add('active');
        drawNow();
        document.querySelectorAll('#controls .ctrl-btn').forEach(b => b.disabled = true);
    }

    function updateUI() {
        stepCounter.textContent = state.steps;
        if (!state.keyCollected) {
            keyIndicator.classList.remove('has-key');
            keyStatus.textContent = 'нет';
        } else {
            keyIndicator.classList.add('has-key');
            keyStatus.textContent = 'есть';
        }
    }

    function initGame(size) {
        if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
        state.size = size;
        state.cells = generateMaze(size);
        state.steps = 0;
        state.keyCollected = false;
        state.gameWon = false;
        state.gameActive = true;
        state.isPlaying = true;
        state.elapsed = 0;
        state.startTime = Date.now();
        state.direction = { dr: 0, dc: 1 };

        const center = Math.floor((size-1)/2);
        state.player = { r: center, c: center };
        const pe = placeKeyAndExit(size);
        state.key = pe.key;
        state.exit = pe.exit;
        if (state.player.r === state.key.r && state.player.c === state.key.c) {
            state.key.r = (state.key.r+1)%size; state.key.c = (state.key.c+1)%size;
        }
        if (state.player.r === state.exit.r && state.player.c === state.exit.c) {
            state.exit.r = (state.exit.r+1)%size; state.exit.c = (state.exit.c+1)%size;
        }

        updateUI();
        resizeCanvas();
        drawNow();

        state.timerInterval = setInterval(() => {
            if (state.isPlaying && !state.gameWon) {
                state.elapsed = Math.floor((Date.now()-state.startTime)/1000);
                timerDisplay.textContent = state.elapsed;
            }
        }, 500);

        menuOverlay.classList.remove('active');
        winOverlay.classList.remove('active');
        document.querySelectorAll('#controls .ctrl-btn').forEach(b => b.disabled = false);
    }

    function resizeCanvas() {
        const wrapper = document.getElementById('canvas-wrapper');
        const rect = wrapper.getBoundingClientRect();
        const size = Math.min(rect.width - 12, rect.height - 12, 700);
        canvasSize = Math.max(120, Math.floor(size));
        dpr = window.devicePixelRatio || 1;
        canvas.width = canvasSize * dpr;
        canvas.height = canvasSize * dpr;
        canvas.style.width = canvasSize + 'px';
        canvas.style.height = canvasSize + 'px';
        ctx.scale(dpr, dpr);
        drawNow();
    }

    function showMenu() {
        if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
        state.isPlaying = false;
        state.gameActive = false;
        winOverlay.classList.remove('active');
        menuOverlay.classList.add('active');
        document.querySelectorAll('#controls .ctrl-btn').forEach(b => b.disabled = true);
        levelBtns.forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.size) === state.size));
        resizeCanvas();
    }

    function restartGame() { if (state.size) initGame(state.size); }

    function startGameFromMenu() {
        let size = 15;
        levelBtns.forEach(btn => { if (btn.classList.contains('active')) size = parseInt(btn.dataset.size); });
        initGame(size);
    }

    // --- Управление (кнопки и свайп) ---
    function setupControls() {
        const dirMap = { up: [-1,0], down: [1,0], left: [0,-1], right: [0,1] };
        document.querySelectorAll('#controls .ctrl-btn[data-dir]').forEach(btn => {
            const handler = (e) => { e.preventDefault(); const [dr, dc] = dirMap[btn.dataset.dir] || [0,0]; tryMove(dr, dc); };
            btn.addEventListener('touchstart', handler, { passive: false });
            btn.addEventListener('mousedown', handler);
        });
        restartLabel.addEventListener('click', restartGame);
        restartLabel.addEventListener('touchstart', (e) => { e.preventDefault(); restartGame(); }, { passive: false });
    }

    function setupSwipe() {
        const wrapper = document.getElementById('canvas-wrapper');
        let startX = 0, startY = 0;

        wrapper.addEventListener('touchstart', (e) => {
            swipeLocked = false;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            if (swipeLocked) return;
            if (e.touches.length !== 1) return;
            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - startY;
            if (Math.abs(dx) > 15 || Math.abs(dy) > 15) {
                swipeLocked = true; // только одно движение за касание
                if (Math.abs(dx) > Math.abs(dy)) {
                    tryMove(0, dx > 0 ? 1 : -1);
                } else {
                    tryMove(dy > 0 ? 1 : -1, 0);
                }
            }
        }, { passive: true });

        wrapper.addEventListener('touchend', () => {
            swipeLocked = false;
        }, { passive: true });
    }

    // --- Инициализация ---
    function init() {
        levelBtns.forEach(btn => {
            btn.addEventListener('click', () => { levelBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); levelBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); }, { passive: false });
        });
        startBtn.addEventListener('click', startGameFromMenu);
        startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startGameFromMenu(); }, { passive: false });
        menuBtn.addEventListener('click', showMenu);
        menuBtn.addEventListener('touchstart', (e) => { e.preventDefault(); showMenu(); }, { passive: false });
        replayBtn.addEventListener('click', restartGame);
        replayBtn.addEventListener('touchstart', (e) => { e.preventDefault(); restartGame(); }, { passive: false });
        winMenuBtn.addEventListener('click', showMenu);
        winMenuBtn.addEventListener('touchstart', (e) => { e.preventDefault(); showMenu(); }, { passive: false });

        setupControls();
        setupSwipe();

        window.addEventListener('resize', () => { clearTimeout(window.reszT); window.reszT = setTimeout(resizeCanvas, 150); });
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));

        state.size = 15;
        state.cells = generateMaze(15);
        state.player = { r: 7, c: 7 };
        const pe = placeKeyAndExit(15);
        state.key = pe.key; state.exit = pe.exit;
        state.direction = { dr: 0, dc: 1 };
        resizeCanvas();
        menuOverlay.classList.add('active');
        document.querySelectorAll('#controls .ctrl-btn').forEach(b => b.disabled = true);
        canvas.addEventListener('selectstart', e => e.preventDefault());
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
})();
</script>
</body>
</html>
